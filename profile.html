<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile — Bag Creator</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d1117; --bg2: #161b22; --bg3: #21262d;
      --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.14);
      --text: #e6edf3; --muted: #8b949e; --accent: #39d353; --accent2: #58a6ff;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Barlow', sans-serif; min-height: 100vh; }

    header {
      background: var(--bg2); border-bottom: 1px solid var(--border);
      padding: 0 2rem; display: grid; grid-template-columns: 1fr auto 1fr; column-gap: 1.5rem; align-items: center;
      height: 64px; position: sticky; top: 0; z-index: 100;
    }
    .logo { font-family: 'Barlow Condensed', sans-serif; font-size: 22px; font-weight: 700; letter-spacing: 0.02em; color: var(--text); text-decoration: none; justify-self: start; }
    .logo span { color: var(--accent); }
    .nav-right { display: flex; align-items: center; gap: 6px; justify-self: end; }
    .nav-tabs { display: flex; gap: 6px; }
    .nav-link { font-size: 13px; font-weight: 600; color: var(--muted); text-decoration: none; letter-spacing: 0.05em; padding: 6px 16px; border: 1px solid var(--border2); border-radius: 6px; transition: all 0.15s; white-space: nowrap; }
    .nav-link:hover { color: var(--text); border-color: rgba(255,255,255,0.25); }
    .nav-link.active { background: rgba(57,211,83,0.12); border-color: rgba(57,211,83,0.4); color: var(--accent); }

    @media (max-width: 500px) {
    }

    /* PAGE */
    .page { max-width: 520px; margin: 3rem auto; padding: 0 1.5rem 4rem; }

    .avatar-row {
      display: flex; align-items: center; gap: 1.25rem; margin-bottom: 2rem;
    }
    .avatar-circle {
      width: 64px; height: 64px; border-radius: 50%;
      background: rgba(57,211,83,0.15); border: 2px solid rgba(57,211,83,0.3);
      color: var(--accent); font-family: 'Barlow Condensed', sans-serif;
      font-size: 28px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
    }
    .avatar-info h2 { font-family: 'Barlow Condensed', sans-serif; font-size: 1.4rem; font-weight: 700; }
    .avatar-info p { font-size: 13px; color: var(--muted); margin-top: 2px; }

    .section {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem;
    }
    .section-title {
      font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 1rem;
    }
    .field { margin-bottom: 0.75rem; }
    .field label { display: block; font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 5px; letter-spacing: 0.04em; text-transform: uppercase; }
    .field input {
      width: 100%; padding: 9px 12px; background: var(--bg3);
      border: 1px solid var(--border2); border-radius: 7px;
      color: var(--text); font-family: 'Barlow', sans-serif; font-size: 14px; outline: none;
      transition: border-color 0.15s;
    }
    .field input:focus { border-color: rgba(255,255,255,0.3); }
    .field input::placeholder { color: var(--muted); }
    .field input[readonly] { opacity: 0.55; cursor: default; }

    .status-msg { font-size: 12px; min-height: 1.2em; margin-top: 0.5rem; }
    .status-msg.success { color: var(--accent); }
    .status-msg.error   { color: #f85149; }

    .btn-row { display: flex; gap: 0.6rem; margin-top: 1rem; flex-wrap: wrap; }
    .btn {
      padding: 8px 18px; font-family: 'Barlow', sans-serif; font-size: 13px; font-weight: 600;
      border-radius: 7px; border: 1px solid var(--border2); background: var(--bg3);
      color: var(--muted); cursor: pointer; transition: all 0.15s;
    }
    .btn:hover { color: var(--text); border-color: rgba(255,255,255,0.25); }
    .btn:disabled { opacity: 0.5; cursor: default; }
    .btn-primary { background: rgba(57,211,83,0.12); border-color: rgba(57,211,83,0.4); color: var(--accent); }
    .btn-primary:hover { background: rgba(57,211,83,0.2); color: var(--accent); }
    .btn-danger { background: rgba(248,81,73,0.08); border-color: rgba(248,81,73,0.3); color: #f85149; }
    .btn-danger:hover { background: rgba(248,81,73,0.15); }

    .provider-badge {
      display: inline-flex; align-items: center; gap: 6px; font-size: 12px;
      padding: 4px 10px; border-radius: 5px; border: 1px solid var(--border2);
      background: var(--bg3); color: var(--muted);
    }

    .not-logged-in { text-align: center; padding: 4rem 2rem; color: var(--muted); }
    .not-logged-in h2 { font-family: 'Barlow Condensed', sans-serif; font-size: 1.5rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text); margin-bottom: 0.5rem; }
    .not-logged-in a { color: var(--accent); text-decoration: none; }
    .not-logged-in a:hover { text-decoration: underline; }

    /* MOBILE HAMBURGER MENU */
    .hamburger-btn {
      display: none; grid-column: 3; grid-row: 1; justify-self: end;
      background: none; border: 1px solid var(--border2); border-radius: 6px;
      color: var(--muted); cursor: pointer; padding: 6px 12px;
      align-items: center; justify-content: center; gap: 6px;
      font-family: 'Barlow', sans-serif; font-size: 12px; font-weight: 600; letter-spacing: 0.04em;
    }
    .hamburger-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.25); }
    .mobile-menu {
      display: none; flex-direction: column;
      position: fixed; top: 64px; left: 0; right: 0; z-index: 99;
      background: var(--bg2); border-bottom: 1px solid var(--border2);
      padding: 0.4rem 0.75rem 0.75rem;
    }
    .mobile-menu.open { display: flex; }
    .mobile-menu-link {
      display: block; width: 100%; text-align: left;
      padding: 10px 12px; font-family: 'Barlow', sans-serif; font-size: 13px; font-weight: 600;
      color: var(--muted); text-decoration: none; border-radius: 6px;
      letter-spacing: 0.04em; background: none; border: none; cursor: pointer;
      transition: background 0.12s, color 0.12s;
    }
    .mobile-menu-link:hover { background: rgba(255,255,255,0.05); color: var(--text); }
    .mobile-menu-link.active { color: var(--accent); }
    .mobile-menu-divider { height: 1px; background: var(--border); margin: 0.4rem 0; }
    @media (max-width: 768px) {
      header { padding: 0 1.25rem; }
      .nav-tabs { display: none; }
      .nav-right { display: none; }
      .hamburger-btn { display: flex; }
    }

    /* HELP TUTORIAL */
    .help-overlay { position:fixed;inset:0;z-index:600;background:rgba(0,0,0,0.65);display:flex;align-items:center;justify-content:center;padding:1rem; }
    .help-dialog { background:var(--bg2);border:1px solid var(--border2);border-radius:14px;width:100%;max-width:420px;display:flex;flex-direction:column;overflow:hidden; }
    .help-header { display:flex;align-items:center;gap:8px;padding:1rem 1.25rem;border-bottom:1px solid var(--border);flex-shrink:0; }
    .help-hdr-title { font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;letter-spacing:.06em;text-transform:uppercase; }
    .help-counter { font-size:12px;color:var(--muted);margin-left:auto; }
    .help-close { background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer;padding:2px 5px;border-radius:4px;line-height:1; }
    .help-close:hover { color:var(--text);background:rgba(255,255,255,0.07); }
    .help-body { padding:2rem 1.5rem;text-align:center;flex:1; }
    .help-icon { font-size:2.5rem;margin-bottom:1rem;line-height:1; }
    .help-step-title { font-family:'Barlow Condensed',sans-serif;font-size:1.2rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin-bottom:.75rem; }
    .help-step-text { font-size:14px;color:var(--muted);line-height:1.65; }
    .help-footer { display:flex;align-items:center;justify-content:space-between;gap:.5rem;padding:.9rem 1.25rem;border-top:1px solid var(--border);flex-shrink:0; }
    .help-nav-btn { padding:7px 15px;font-family:'Barlow',sans-serif;font-size:13px;font-weight:600;border-radius:7px;border:1px solid var(--border2);background:var(--bg3);color:var(--muted);cursor:pointer;transition:all .15s;white-space:nowrap; }
    .help-nav-btn:hover { color:var(--text);border-color:rgba(255,255,255,.25); }
    .help-nav-btn:disabled { opacity:.3;cursor:default; }
    .help-nav-primary { background:rgba(57,211,83,.12);border-color:rgba(57,211,83,.4);color:var(--accent); }
    .help-nav-primary:hover { background:rgba(57,211,83,.22); }
    .help-dots { display:flex;gap:5px;align-items:center; }
    .help-dot { width:7px;height:7px;border-radius:50%;background:var(--border2);border:none;cursor:pointer;padding:0;transition:background .15s; }
    .help-dot.active { background:var(--accent); }
    .nav-help-btn { display:inline-flex;align-items:center;gap:5px;background:none;cursor:pointer; }

    /* TOGGLE SWITCH */
    .toggle-row { display: flex; align-items: center; gap: 0.75rem; margin-top: 4px; }
    .toggle-switch { position: relative; display: inline-block; width: 42px; height: 22px; flex-shrink: 0; }
    .toggle-switch input { opacity: 0; width: 0; height: 0; position: absolute; }
    .toggle-track {
      position: absolute; cursor: pointer; inset: 0;
      background: var(--bg3); border: 1px solid var(--border2);
      border-radius: 22px; transition: 0.2s;
    }
    .toggle-track::before {
      content: ''; position: absolute;
      width: 16px; height: 16px; left: 2px; bottom: 2px;
      background: var(--muted); border-radius: 50%; transition: 0.2s;
    }
    .toggle-switch input:checked + .toggle-track { background: rgba(57,211,83,0.18); border-color: rgba(57,211,83,0.5); }
    .toggle-switch input:checked + .toggle-track::before { transform: translateX(20px); background: var(--accent); }
    .toggle-label { font-size: 13px; color: var(--muted); }

    /* APPEARANCE */
    .color-swatches { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 4px; }
    .color-swatch {
      width: 28px; height: 28px; border-radius: 50%;
      border: 3px solid transparent; cursor: pointer; outline: none;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .color-swatch:hover { transform: scale(1.18); }
    .color-swatch.active { box-shadow: 0 0 0 2px var(--bg2), 0 0 0 4px rgba(255,255,255,0.55); }
    .photo-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-top: 4px; }
    .avatar-img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; display: block; }
  </style>
</head>
<body>

<header>
  <a class="logo" href="index.html">Bag<span>Creator</span></a>
  <nav class="nav-tabs">
    <a class="nav-link" href="index.html">Bag Builder</a>
    <a class="nav-link" href="custom-bag.html">My Bag</a>
    <a class="nav-link" href="archive.html">Disc Archive</a>
    <a class="nav-link" href="social.html">Community</a>
  </nav>
  <div class="nav-right">
    <button class="nav-link nav-help-btn" id="help-btn"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg> Help</button>
    <a class="nav-link active" href="profile.html" id="nav-profile" style="display:none">Profile</a>
    <a class="nav-link" href="login.html" id="nav-auth">Sign In</a>
  </div>
  <button class="hamburger-btn" id="hamburger-btn"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg> Menu</button>
</header>

<div class="mobile-menu" id="mobile-menu">
  <a class="mobile-menu-link" href="index.html">Bag Builder</a>
  <a class="mobile-menu-link" href="custom-bag.html">My Bag</a>
  <a class="mobile-menu-link" href="archive.html">Disc Archive</a>
  <a class="mobile-menu-link" href="social.html">Community</a>
  <div class="mobile-menu-divider"></div>
  <button class="mobile-menu-link" id="help-btn-mobile">? Help</button>
  <a class="mobile-menu-link active" href="profile.html" id="nav-profile-mobile">Profile</a>
  <a class="mobile-menu-link" href="login.html" id="nav-auth-mobile">Sign In</a>
</div>

<div class="page" id="page-content">
  <div class="not-logged-in" id="not-logged-in" style="display:none">
    <h2>Not signed in</h2>
    <p>Please <a href="login.html?from=profile.html">sign in</a> to view your profile.</p>
  </div>
</div>

<script src="supabase-config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
  auth: { detectSessionInUrl: true }
});

function applyAuthState(user) {
  const navAuth     = document.getElementById('nav-auth');
  const navProfile  = document.getElementById('nav-profile');
  const navAuthM    = document.getElementById('nav-auth-mobile');
  const navProfileM = document.getElementById('nav-profile-mobile');
  if (user) {
    if (navProfile)  navProfile.style.display  = '';
    if (navProfileM) navProfileM.style.display = '';
    if (navAuth)  { navAuth.textContent  = 'Sign Out'; navAuth.href  = '#'; navAuth.onclick  = e => { e.preventDefault(); supabase.auth.signOut(); }; }
    if (navAuthM) { navAuthM.textContent = 'Sign Out'; navAuthM.href = '#'; navAuthM.onclick = e => { e.preventDefault(); supabase.auth.signOut(); }; }
    renderProfile(user);
  } else {
    document.getElementById('not-logged-in').style.display = '';
    if (navProfile)  navProfile.style.display  = 'none';
    if (navProfileM) navProfileM.style.display = 'none';
    if (navAuth)  { navAuth.textContent  = 'Sign In'; navAuth.href  = 'login.html?from=profile.html'; navAuth.onclick  = null; }
    if (navAuthM) { navAuthM.textContent = 'Sign In'; navAuthM.href = 'login.html?from=profile.html'; navAuthM.onclick = null; }
  }
}

supabase.auth.getSession().then(({ data }) => applyAuthState(data.session?.user ?? null));
supabase.auth.onAuthStateChange((event, session) => applyAuthState(session?.user ?? null));

const AVATAR_COLORS = [
  { bg:'rgba(57,211,83,0.15)',   border:'rgba(57,211,83,0.3)',   text:'#39d353', val:'#39d353' },
  { bg:'rgba(88,166,255,0.15)',  border:'rgba(88,166,255,0.3)',  text:'#58a6ff', val:'#58a6ff' },
  { bg:'rgba(163,113,247,0.15)', border:'rgba(163,113,247,0.3)', text:'#a371f7', val:'#a371f7' },
  { bg:'rgba(255,121,198,0.15)', border:'rgba(255,121,198,0.3)', text:'#ff79c6', val:'#ff79c6' },
  { bg:'rgba(255,184,0,0.15)',   border:'rgba(255,184,0,0.3)',   text:'#ffb800', val:'#ffb800' },
  { bg:'rgba(224,92,42,0.15)',   border:'rgba(224,92,42,0.3)',   text:'#e05c2a', val:'#e05c2a' },
  { bg:'rgba(248,81,73,0.15)',   border:'rgba(248,81,73,0.3)',   text:'#f85149', val:'#f85149' },
  { bg:'rgba(0,210,211,0.15)',   border:'rgba(0,210,211,0.3)',   text:'#00d2d3', val:'#00d2d3' },
];

function applyAvatar(colorVal, photoData, initial) {
  const circle = document.getElementById('avatar-circle');
  if (!circle) return;
  const c = AVATAR_COLORS.find(x => x.val === colorVal) || AVATAR_COLORS[0];
  circle.style.border = `2px solid ${c.border}`;
  if (photoData) {
    circle.innerHTML = `<img class="avatar-img" src="${photoData}" alt="">`;
    circle.style.background = 'none';
    circle.style.color = '';
    circle.style.fontSize = '';
  } else {
    circle.textContent = initial;
    circle.style.background = c.bg;
    circle.style.color = c.text;
    circle.style.fontSize = '28px';
  }
}

function getUserLabel(user) {
  return user.user_metadata?.displayName || user.user_metadata?.full_name || user.email || '';
}

function renderProfile(user) {
  const userLabel = getUserLabel(user);
  document.getElementById('page-content').innerHTML = `
    <div class="avatar-row">
      <div class="avatar-circle" id="avatar-circle">${(userLabel || '?')[0].toUpperCase()}</div>
      <div class="avatar-info">
        <h2 id="display-name-heading">${user.user_metadata?.displayName || user.user_metadata?.full_name || 'No name set'}</h2>
        <p>${user.email}</p>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Account Info</div>
      <div class="field">
        <label>Email</label>
        <input type="text" value="${user.email}" readonly />
      </div>
      <div class="field">
        <label>Display Name</label>
        <input type="text" id="display-name-input" value="${user.user_metadata?.displayName || user.user_metadata?.full_name || ''}" placeholder="Your name" maxlength="30" />
        <div style="font-size:11px;color:var(--muted);margin-top:4px;text-align:right" id="name-char-count">${(user.user_metadata?.displayName || user.user_metadata?.full_name || '').length}/30</div>
      </div>
      <div class="field">
        <label>Sign-in method</label>
        <div style="margin-top:4px">
          <span class="provider-badge">
            ${isGoogle
              ? `<svg width="13" height="13" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg> Google`
              : `<svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="12" height="8" rx="1.5"/><path d="M5 7V5a3 3 0 0 1 6 0v2"/></svg> Email &amp; Password`}
          </span>
        </div>
      </div>
      <div class="status-msg" id="profile-status"></div>
      <div class="btn-row">
        <button class="btn btn-primary" id="save-profile-btn">Save Changes</button>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Appearance</div>
      <div class="field">
        <label>Avatar Color</label>
        <div class="color-swatches" id="color-swatches"></div>
      </div>
      <div class="field">
        <label>Profile Photo</label>
        <div class="photo-row">
          <input type="file" id="photo-input" accept="image/*" style="display:none">
          <button class="btn" id="upload-photo-btn">Upload Photo</button>
          ${user.photoURL ? `<button class="btn" id="use-google-photo-btn">Use Google Photo</button>` : ''}
          <button class="btn btn-danger" id="remove-photo-btn" style="display:none">Remove Photo</button>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Bag Info</div>
      <div class="field">
        <label>Max Throw Distance (ft)</label>
        <input type="number" id="prof-dist" min="100" max="600" step="25" placeholder="e.g. 300" />
      </div>
      <div class="field">
        <label>Bag Size (total discs)</label>
        <input type="number" id="prof-bagsize" min="0" max="36" placeholder="e.g. 18" />
      </div>
      <div class="status-msg" id="bag-settings-status"></div>
      <div class="btn-row">
        <button class="btn btn-primary" id="save-bag-settings-btn">Save</button>
      </div>
    </div>


    <div class="section">
      <div class="section-title">Privacy</div>
      <div class="field">
        <label>Community Page</label>
        <div class="toggle-row">
          <label class="toggle-switch">
            <input type="checkbox" id="public-toggle" />
            <span class="toggle-track"></span>
          </label>
          <span class="toggle-label">Show my bag publicly on the Community page</span>
        </div>
        <div class="status-msg" id="privacy-status"></div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Session</div>
      <div class="btn-row">
        <button class="btn btn-danger" id="signout-btn">Sign Out</button>
      </div>
    </div>
  `;

  let isPublic = false;

  // Live char counter
  document.getElementById('display-name-input').addEventListener('input', function() {
    document.getElementById('name-char-count').textContent = this.value.length + '/30';
  });

  // Save display name
  document.getElementById('save-profile-btn').addEventListener('click', async () => {
    const name   = document.getElementById('display-name-input').value.trim();
    const status = document.getElementById('profile-status');
    const btn    = document.getElementById('save-profile-btn');
    btn.disabled = true;
    try {
      await supabase.auth.updateUser({ data: { displayName: name } });
      if (isPublic) {
        await supabase.from('bags').upsert(
          { user_id: user.id, display_name: name || user.email || '' },
          { onConflict: 'user_id' }
        );
      }
      document.getElementById('display-name-heading').textContent = name || 'No name set';
      const circle = document.getElementById('avatar-circle');
      if (!circle.querySelector('img')) circle.textContent = (name || user.email || '?')[0].toUpperCase();
      status.textContent = 'Saved.'; status.className = 'status-msg success';
    } catch (e) {
      status.textContent = e.message; status.className = 'status-msg error';
    }
    btn.disabled = false;
    setTimeout(() => { status.textContent = ''; }, 3000);
  });

  // Sign out
  document.getElementById('signout-btn').addEventListener('click', async () => {
    await supabase.auth.signOut();
    window.location.href = 'login.html?from=profile.html';
  });

  // Load all prefs: bag info + appearance
  (async () => {
    const distInput    = document.getElementById('prof-dist');
    const bagSizeInput = document.getElementById('prof-bagsize');
    const bagStatus    = document.getElementById('bag-settings-status');
    const initial      = getUserLabel(user)[0]?.toUpperCase() || '?';

    let currentColor = '#39d353';
    let currentPhoto = null;
    let currentPrefs = {};

    async function savePrefs(updates) {
      currentPrefs = { ...currentPrefs, ...updates };
      await supabase.from('bags').upsert(
        { user_id: user.id, prefs: currentPrefs },
        { onConflict: 'user_id' }
      );
    }

    try {
      const { data } = await supabase.from('bags').select('prefs').eq('user_id', user.id).single();
      const p = data?.prefs || {};
      currentPrefs = p;
      if (p.dist)        distInput.value    = p.dist;
      if (p.bagSize)     bagSizeInput.value = p.bagSize;
      if (p.avatarColor) currentColor       = p.avatarColor;
      if (p.avatarPhoto) currentPhoto       = p.avatarPhoto;
      if (p.public)      isPublic           = true;
    } catch (e) { console.error(e); }

    document.getElementById('public-toggle').checked = isPublic;

    applyAvatar(currentColor, currentPhoto, initial);

    // Render color swatches
    const swatchWrap = document.getElementById('color-swatches');
    swatchWrap.innerHTML = AVATAR_COLORS.map(c =>
      `<button class="color-swatch${c.val === currentColor ? ' active' : ''}" style="background:${c.val}" data-val="${c.val}"></button>`
    ).join('');
    swatchWrap.addEventListener('click', async e => {
      const btn = e.target.closest('.color-swatch');
      if (!btn) return;
      currentColor = btn.dataset.val;
      applyAvatar(currentColor, currentPhoto, initial);
      swatchWrap.querySelectorAll('.color-swatch').forEach(s =>
        s.classList.toggle('active', s.dataset.val === currentColor)
      );
      try { await savePrefs({ avatarColor: currentColor }); } catch (e) { console.error(e); }
    });

    // Photo upload
    const removeBtn = document.getElementById('remove-photo-btn');
    if (currentPhoto) removeBtn.style.display = '';

    document.getElementById('upload-photo-btn').addEventListener('click', () => {
      document.getElementById('photo-input').click();
    });

    document.getElementById('photo-input').addEventListener('change', e => {
      const file = e.target.files[0];
      if (!file) return;
      const url = URL.createObjectURL(file);
      const img = new Image();
      img.onload = async () => {
        const canvas = document.createElement('canvas');
        canvas.width = 80; canvas.height = 80;
        const size = Math.min(img.width, img.height);
        canvas.getContext('2d').drawImage(img, (img.width - size) / 2, (img.height - size) / 2, size, size, 0, 0, 80, 80);
        currentPhoto = canvas.toDataURL('image/jpeg', 0.75);
        URL.revokeObjectURL(url);
        applyAvatar(currentColor, currentPhoto, initial);
        removeBtn.style.display = '';
        try { await savePrefs({ avatarPhoto: currentPhoto }); } catch (e) { console.error(e); }
      };
      img.src = url;
    });

    const googlePhotoBtn = document.getElementById('use-google-photo-btn');
    if (googlePhotoBtn) {
      googlePhotoBtn.addEventListener('click', async () => {
        currentPhoto = user.user_metadata?.avatar_url || user.user_metadata?.picture || null;
        applyAvatar(currentColor, currentPhoto, initial);
        removeBtn.style.display = '';
        try { await savePrefs({ avatarPhoto: currentPhoto }); } catch (e) { console.error(e); }
      });
    }

    removeBtn.addEventListener('click', async () => {
      currentPhoto = null;
      applyAvatar(currentColor, null, initial);
      removeBtn.style.display = 'none';
      try { await savePrefs({ avatarPhoto: null }); } catch (e) { console.error(e); }
    });

    // Public toggle
    document.getElementById('public-toggle').addEventListener('change', async function() {
      isPublic = this.checked;
      const privStatus = document.getElementById('privacy-status');
      try {
        await savePrefs({ public: isPublic });
        await supabase.from('bags').upsert(
          { user_id: user.id, display_name: getUserLabel(user) },
          { onConflict: 'user_id' }
        );
        privStatus.textContent = isPublic ? 'Your bag is now visible on the Community page.' : 'Your bag is now hidden.';
        privStatus.className = 'status-msg success';
      } catch (e) {
        this.checked = !isPublic;
        isPublic = !isPublic;
        privStatus.textContent = e.message;
        privStatus.className = 'status-msg error';
      }
      setTimeout(() => { privStatus.textContent = ''; }, 4000);
    });

    // Bag info save
    document.getElementById('save-bag-settings-btn').addEventListener('click', async () => {
      const btn = document.getElementById('save-bag-settings-btn');
      btn.disabled = true;
      const newDist    = Math.max(100, Math.min(600, parseInt(distInput.value)    || 300));
      const newBagSize = Math.max(0,   Math.min(36,  parseInt(bagSizeInput.value) || 0));
      try {
        await savePrefs({ dist: newDist, bagSize: newBagSize });
        bagStatus.textContent = 'Saved.'; bagStatus.className = 'status-msg success';
      } catch (e) {
        bagStatus.textContent = e.message; bagStatus.className = 'status-msg error';
      }
      btn.disabled = false;
      setTimeout(() => { bagStatus.textContent = ''; }, 3000);
    });
  })();
}
</script>

<div class="help-overlay" id="help-overlay" style="display:none">
  <div class="help-dialog">
    <div class="help-header">
      <span class="help-hdr-title">Help</span>
      <span class="help-counter" id="help-counter"></span>
      <button class="help-close" id="help-close">×</button>
    </div>
    <div class="help-body">
      <div class="help-icon" id="help-icon"></div>
      <div class="help-step-title" id="help-step-title"></div>
      <div class="help-step-text" id="help-step-text"></div>
    </div>
    <div class="help-footer">
      <button class="help-nav-btn" id="help-prev" disabled>← Back</button>
      <div class="help-dots" id="help-dots"></div>
      <button class="help-nav-btn help-nav-primary" id="help-next">Next →</button>
    </div>
  </div>
</div>
<script>
(function() {
  const STEPS = [
    { icon: '👤', title: 'Your Profile', text: 'Manage your account from here. You can update your display name, store your bag preferences, and sign out.' },
    { icon: '✏️', title: 'Display Name', text: 'Set a display name up to 30 characters. This personalizes your account — it appears in the header when you are signed in.' },
    { icon: '🎒', title: 'Bag Info', text: 'Store your max throw distance and total bag size here for reference. These are informational only and do not affect the Bag Builder page.' },
    { icon: '🚪', title: 'Sign Out', text: 'Use the Sign Out button at the bottom to log out of your account. Your bag and settings are saved to your account and will be waiting when you sign back in.' },
  ];
  let cur = 0;
  function render() {
    const s = STEPS[cur];
    document.getElementById('help-icon').textContent = s.icon;
    document.getElementById('help-step-title').textContent = s.title;
    document.getElementById('help-step-text').textContent = s.text;
    document.getElementById('help-counter').textContent = (cur + 1) + ' / ' + STEPS.length;
    document.getElementById('help-prev').disabled = cur === 0;
    document.getElementById('help-next').textContent = cur === STEPS.length - 1 ? 'Done' : 'Next →';
    document.getElementById('help-dots').innerHTML = STEPS.map(function(_, i) {
      return '<button class="help-dot' + (i === cur ? ' active' : '') + '" data-i="' + i + '"></button>';
    }).join('');
  }
  function open() { cur = 0; render(); document.getElementById('help-overlay').style.display = 'flex'; }
  function close() { document.getElementById('help-overlay').style.display = 'none'; }
  document.getElementById('help-btn').addEventListener('click', open);
  document.getElementById('help-close').addEventListener('click', close);
  document.getElementById('help-overlay').addEventListener('click', function(e) { if (e.target === document.getElementById('help-overlay')) close(); });
  document.getElementById('help-prev').addEventListener('click', function() { if (cur > 0) { cur--; render(); } });
  document.getElementById('help-next').addEventListener('click', function() { if (cur < STEPS.length - 1) { cur++; render(); } else close(); });
  document.getElementById('help-dots').addEventListener('click', function(e) { var d = e.target.closest('[data-i]'); if (d) { cur = parseInt(d.dataset.i); render(); } });
  document.addEventListener('keydown', function(e) {
    if (document.getElementById('help-overlay').style.display === 'none') return;
    if (e.key === 'Escape') close();
    if (e.key === 'ArrowRight' && cur < STEPS.length - 1) { cur++; render(); }
    if (e.key === 'ArrowLeft' && cur > 0) { cur--; render(); }
  });
})();
</script>
<script>
(function() {
  var ham = document.getElementById('hamburger-btn');
  var menu = document.getElementById('mobile-menu');
  ham.addEventListener('click', function(e) { e.stopPropagation(); menu.classList.toggle('open'); });
  document.addEventListener('click', function(e) {
    if (!e.target.closest('#mobile-menu')) menu.classList.remove('open');
  });
  var helpM = document.getElementById('help-btn-mobile');
  if (helpM) helpM.addEventListener('click', function() { menu.classList.remove('open'); document.getElementById('help-btn').click(); });
  menu.querySelectorAll('a').forEach(function(a) { a.addEventListener('click', function() { menu.classList.remove('open'); }); });
})();
</script>
