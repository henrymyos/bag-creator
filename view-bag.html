<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>View Bag — Bag Creator</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet" />
  <script src="theme.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d1117; --bg2: #161b22; --bg3: #21262d;
      --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.14);
      --text: #e6edf3; --muted: #8b949e; --accent: #39d353;
    }
    [data-theme="light"] {
      --bg: #f6f8fa; --bg2: #ffffff; --bg3: #eaeef2;
      --border: rgba(0,0,0,0.09); --border2: rgba(0,0,0,0.16);
      --text: #1f2328; --muted: #57606a; --accent: #1a7f37; --accent2: #0969da;
    }
    [data-theme="light"] .hero { background: var(--bg2); }
    [data-theme="light"] .mobile-menu-link:hover { background: rgba(0,0,0,0.05); }
    body { background: var(--bg); color: var(--text); font-family: 'Barlow', sans-serif; min-height: 100vh; }

    header {
      background: var(--bg2); border-bottom: 1px solid var(--border);
      padding: 0 2rem; display: grid; grid-template-columns: 1fr auto 1fr;
      column-gap: 1.5rem; align-items: center; height: 64px;
      position: sticky; top: 0; z-index: 100;
    }
    .logo { font-family: 'Barlow Condensed', sans-serif; font-size: 22px; font-weight: 700; letter-spacing: 0.02em; color: var(--text); text-decoration: none; justify-self: start; }
    .logo span { color: var(--accent); }
    .nav-tabs { display: flex; gap: 6px; }
    .nav-right { display: flex; align-items: center; gap: 6px; justify-self: end; }
    .nav-link { font-size: 13px; font-weight: 600; color: var(--muted); text-decoration: none; letter-spacing: 0.05em; padding: 6px 16px; border: 1px solid var(--border2); border-radius: 6px; transition: all 0.15s; white-space: nowrap; }
    .nav-link:hover { color: var(--text); border-color: rgba(255,255,255,0.25); }
    .nav-link.active { background: rgba(57,211,83,0.12); border-color: rgba(57,211,83,0.4); color: var(--accent); }

    .hamburger-btn {
      display: none; grid-column: 3; grid-row: 1; justify-self: end;
      background: none; border: 1px solid var(--border2); border-radius: 6px;
      color: var(--muted); cursor: pointer; padding: 6px 12px;
      align-items: center; gap: 6px;
      font-family: 'Barlow', sans-serif; font-size: 12px; font-weight: 600; letter-spacing: 0.04em;
    }
    .hamburger-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.25); }
    .mobile-menu {
      display: none; flex-direction: column;
      position: fixed; top: 64px; left: 0; right: 0; z-index: 99;
      background: var(--bg2); border-bottom: 1px solid var(--border2);
      padding: 0.4rem 0.75rem 0.75rem;
    }
    .mobile-menu.open { display: flex; }
    .mobile-menu-link {
      display: block; width: 100%; text-align: left;
      padding: 10px 12px; font-family: 'Barlow', sans-serif; font-size: 13px; font-weight: 600;
      color: var(--muted); text-decoration: none; border-radius: 6px;
      letter-spacing: 0.04em; background: none; border: none; cursor: pointer;
      transition: background 0.12s, color 0.12s;
    }
    .mobile-menu-link:hover { background: rgba(255,255,255,0.05); color: var(--text); }
    .mobile-menu-link.active { color: var(--accent); }
    .mobile-menu-divider { height: 1px; background: var(--border); margin: 0.4rem 0; }
    @media (max-width: 768px) {
      header { padding: 0 1.25rem; }
      .nav-tabs { display: none; }
      .nav-right { display: none; }
      .hamburger-btn { display: flex; }
    }

    .page { max-width: 700px; margin: 0 auto; padding: 2rem 1.5rem 5rem; }

    .back-link {
      display: inline-flex; align-items: center; gap: 5px;
      color: var(--muted); font-size: 13px; font-weight: 600;
      text-decoration: none; letter-spacing: 0.04em;
      margin-bottom: 1.25rem; transition: color 0.15s;
    }
    .back-link:hover { color: var(--text); }

    .bag-header {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 12px; padding: 1.35rem; margin-bottom: 0.75rem;
    }
    .owner-row { display: flex; align-items: center; gap: 0.85rem; margin-bottom: 1rem; }
    .owner-avatar {
      width: 48px; height: 48px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Barlow Condensed', sans-serif; font-size: 20px; font-weight: 700;
      overflow: hidden;
    }
    .owner-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; display: block; }
    .owner-name { font-family: 'Barlow Condensed', sans-serif; font-size: 1.15rem; font-weight: 700; letter-spacing: 0.02em; }
    .owner-meta { font-size: 12px; color: var(--muted); margin-top: 3px; }

    .disc-breakdown { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 1.1rem; }
    .breakdown-item { padding: 2px 8px; border-radius: 4px; font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 11.5px; letter-spacing: 0.04em; border: 1px solid; }
    .breakdown-putter   { color: #3fb950; border-color: rgba(63,185,80,0.25);   background: rgba(63,185,80,0.08);   }
    .breakdown-midrange { color: #d29922; border-color: rgba(210,153,34,0.25);  background: rgba(210,153,34,0.08);  }
    .breakdown-fairway  { color: #a371f7; border-color: rgba(163,113,247,0.25); background: rgba(163,113,247,0.08); }
    .breakdown-distance { color: #f78166; border-color: rgba(247,129,102,0.25); background: rgba(247,129,102,0.08); }
    .breakdown-total    { color: var(--muted); border-color: var(--border2); background: var(--bg3); margin-left: auto; }

    .bag-actions { display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; }
    .like-btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 7px 14px; font-family: 'Barlow', sans-serif; font-size: 13px; font-weight: 600;
      border-radius: 7px; border: 1px solid var(--border2); background: var(--bg3);
      color: var(--muted); cursor: pointer; transition: all 0.15s; user-select: none;
    }
    .like-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.25); }
    .like-btn.liked { color: #f78166; border-color: rgba(247,129,102,0.4); background: rgba(247,129,102,0.1); }
    .like-btn svg { width: 14px; height: 14px; flex-shrink: 0; transition: fill 0.15s; }

    .disc-sections { display: flex; flex-direction: column; gap: 0.6rem; margin-bottom: 0.75rem; }
    .disc-section { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
    .disc-section-hdr {
      display: flex; align-items: center; gap: 0.6rem;
      padding: 0.65rem 1rem; border-bottom: 1px solid var(--border);
    }
    .disc-section-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
    .disc-section-label { font-family: 'Barlow Condensed', sans-serif; font-size: 12.5px; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; }
    .disc-section-count { font-size: 11px; color: var(--muted); margin-left: auto; }
    .disc-list { padding: 0.4rem 0.5rem; }
    .disc-row {
      display: flex; align-items: center; gap: 0.5rem;
      padding: 0.45rem 0.5rem; border-radius: 6px; transition: background 0.1s;
    }
    .disc-row:hover { background: var(--bg3); }
    .disc-name { font-size: 13px; font-weight: 600; }
    .disc-brand { font-size: 11px; color: var(--muted); }
    .disc-qty { margin-left: auto; font-family: 'Barlow Condensed', sans-serif; font-size: 11.5px; font-weight: 700; color: var(--muted); }

    .comments-section { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
    .comments-hdr {
      padding: 0.9rem 1.25rem; border-bottom: 1px solid var(--border);
      font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 700;
      letter-spacing: 0.06em; text-transform: uppercase;
    }
    .comment-thread { border-bottom: 1px solid var(--border); }
    .comment-thread:last-child { border-bottom: none; }
    .comment { display: flex; gap: 0.75rem; padding: 0.9rem 1.25rem 0.75rem; }
    .comment-avatar {
      width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 700;
    }
    .comment-body { flex: 1; min-width: 0; }
    .comment-meta { display: flex; align-items: baseline; gap: 0.5rem; margin-bottom: 4px; }
    .comment-author { font-size: 13px; font-weight: 600; }
    .comment-time { font-size: 11px; color: var(--muted); }
    .comment-text { font-size: 13px; color: var(--muted); line-height: 1.55; word-break: break-word; white-space: pre-wrap; }
    .comment-reply-btn {
      background: none; border: none; color: var(--muted); font-size: 11px; font-weight: 600;
      cursor: pointer; padding: 3px 0; margin-top: 4px; letter-spacing: 0.03em;
      transition: color 0.12s; display: block;
    }
    .comment-reply-btn:hover { color: var(--text); }
    .comment-replies { margin-left: 1.25rem; padding-left: 0.75rem; border-left: 2px solid var(--border2); }
    .reply { display: flex; gap: 0.55rem; padding: 0.6rem 1.25rem 0.6rem 0; }
    .reply-avatar {
      width: 24px; height: 24px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Barlow Condensed', sans-serif; font-size: 10px; font-weight: 700;
    }
    .reply-form-wrap {
      display: flex; gap: 0.5rem; align-items: flex-start;
      margin: 0 1.25rem 0.75rem 2rem; padding-left: 0.75rem;
      border-left: 2px solid var(--border2);
    }
    .no-comments { text-align: center; padding: 1.75rem; font-size: 13px; color: var(--muted); }
    .comment-form-wrap {
      display: flex; gap: 0.65rem; align-items: flex-start;
      padding: 0.9rem 1.25rem; border-top: 1px solid var(--border);
    }
    .comment-textarea {
      flex: 1; padding: 8px 12px; background: var(--bg3);
      border: 1px solid var(--border2); border-radius: 7px;
      color: var(--text); font-family: 'Barlow', sans-serif; font-size: 13px;
      resize: none; outline: none; min-height: 38px; max-height: 120px;
      transition: border-color 0.15s; line-height: 1.4; overflow-y: auto;
    }
    .comment-textarea:focus { border-color: rgba(255,255,255,0.3); }
    .comment-textarea::placeholder { color: var(--muted); }
    .comment-submit {
      padding: 8px 16px; font-family: 'Barlow', sans-serif; font-size: 13px; font-weight: 600;
      border-radius: 7px; border: 1px solid rgba(57,211,83,0.4);
      background: rgba(57,211,83,0.12); color: var(--accent);
      cursor: pointer; transition: all 0.15s; flex-shrink: 0;
    }
    .comment-submit:hover:not(:disabled) { background: rgba(57,211,83,0.2); }
    .comment-submit:disabled { opacity: 0.4; cursor: default; }
    .sign-in-prompt {
      padding: 1rem 1.25rem; border-top: 1px solid var(--border);
      text-align: center; font-size: 13px; color: var(--muted);
    }
    .sign-in-prompt a { color: var(--accent); text-decoration: none; }
    .sign-in-prompt a:hover { text-decoration: underline; }

    .state-msg { text-align: center; padding: 4rem 2rem; color: var(--muted); font-size: 14px; line-height: 1.6; }
    .state-msg strong { display: block; font-family: 'Barlow Condensed', sans-serif; font-size: 1.3rem; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; color: var(--text); margin-bottom: 0.35rem; }
    .state-msg a { color: var(--accent); text-decoration: none; }

    .fc-open-btn { padding:7px 14px; font-family:'Barlow',sans-serif; font-size:12px; font-weight:600; border-radius:6px; border:1px solid rgba(167,139,250,0.4); background:rgba(167,139,250,0.08); color:#a78bfa; cursor:pointer; transition:all 0.15s; margin-left:auto; }
    .fc-throw-bar { display:flex;gap:4px;padding:0.6rem 1.25rem;border-bottom:1px solid var(--border);flex-shrink:0; }
    .fc-throw-btn { padding:4px 12px;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;border-radius:5px;border:1px solid var(--border2);background:var(--bg3);color:var(--muted);cursor:pointer;transition:all 0.15s; }
    .fc-throw-btn.active { color:#58a6ff;border-color:rgba(88,166,255,0.4);background:rgba(88,166,255,0.08); }
    .fc-open-btn:hover { background:rgba(167,139,250,0.15); }
    .fc-overlay { position:fixed;inset:0;z-index:600;background:rgba(0,0,0,0.65);display:flex;align-items:center;justify-content:center;padding:1rem; }
    .fc-dialog { background:var(--bg2);border:1px solid var(--border2);border-radius:14px;width:100%;max-width:720px;max-height:90vh;display:flex;flex-direction:column;overflow:hidden; }
    .fc-hdr { display:flex;align-items:center;padding:1rem 1.25rem;border-bottom:1px solid var(--border);flex-shrink:0; }
    .fc-title { font-family:'Barlow Condensed',sans-serif;font-size:1.1rem;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;flex:1; }
    .fc-close { background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer;padding:2px 5px;border-radius:4px;line-height:1;transition:color 0.12s; }
    .fc-close:hover { color:var(--text); }
    .fc-body { padding:1.25rem;overflow-y:auto;flex:1; }
    .fc-type-tabs { display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem; }
    .fc-type-tab { padding:5px 12px;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:0.05em;text-transform:uppercase;border-radius:5px;border:1px solid var(--border2);background:var(--bg3);color:var(--muted);cursor:pointer;transition:all 0.15s; }
    .fc-type-tab.active { color:var(--accent);border-color:rgba(57,211,83,0.4);background:rgba(57,211,83,0.08); }
    .fc-dist-label { display:block;font-size:12px;color:var(--muted);margin-bottom:0.6rem; }
    .fc-dist-ctrl { display:flex;align-items:center;gap:8px;margin-bottom:0.35rem; }
    .fc-step-btn { width:28px;height:28px;border-radius:6px;border:1px solid var(--border2);background:var(--bg3);color:var(--text);font-size:17px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.12s;flex-shrink:0; }
    .fc-step-btn:hover { border-color:rgba(255,255,255,0.25); }
    .fc-slider { flex:1;accent-color:#a78bfa;cursor:pointer; }
    .fc-dist-val { font-size:12px;color:var(--muted);text-align:center; }
  </style>
</head>

<script src="discs.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const AVATAR_COLORS = [
  { val:'#39d353', bg:'rgba(57,211,83,0.15)',   border:'rgba(57,211,83,0.3)'   },
  { val:'#58a6ff', bg:'rgba(88,166,255,0.15)',  border:'rgba(88,166,255,0.3)'  },
  { val:'#a371f7', bg:'rgba(163,113,247,0.15)', border:'rgba(163,113,247,0.3)' },
  { val:'#ff79c6', bg:'rgba(255,121,198,0.15)', border:'rgba(255,121,198,0.3)' },
  { val:'#ffb800', bg:'rgba(255,184,0,0.15)',   border:'rgba(255,184,0,0.3)'   },
  { val:'#e05c2a', bg:'rgba(224,92,42,0.15)',   border:'rgba(224,92,42,0.3)'   },
  { val:'#f85149', bg:'rgba(248,81,73,0.15)',   border:'rgba(248,81,73,0.3)'   },
  { val:'#00d2d3', bg:'rgba(0,210,211,0.15)',   border:'rgba(0,210,211,0.3)'   },
];

const TYPE_CONFIG = [
  { key:'putter',   label:'Putters',         cls:'putter',   color:'#3fb950' },
  { key:'midrange', label:'Midranges',        cls:'midrange', color:'#d29922' },
  { key:'fairway',  label:'Fairway Drivers',  cls:'fairway',  color:'#a371f7' },
  { key:'distance', label:'Distance Drivers', cls:'distance', color:'#f78166' },
];

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function decodeBagKeys(keys) {
  if (!Array.isArray(keys)) return [];
  return keys.flatMap(key => {
    if (/^\d+$/.test(String(key))) {
      const d = DISCS[parseInt(key)];
      return d ? [d] : [];
    }
    const parts = String(key).split('|');
    const brand = parts[0], type = parts[1], name = parts.slice(2).join('|');
    const d = DISCS.find(x => x.brand === brand && x.type === type && x.name === name);
    return d ? [d] : [];
  });
}

function encodeBagIndices(discs) {
  return discs.map(d => DISCS.indexOf(d)).filter(i => i !== -1).join('-');
}

function timeAgo(ts) {
  if (!ts) return '';
  const secs = Math.floor((Date.now() - new Date(ts).getTime()) / 1000);
  if (secs < 60)     return 'just now';
  if (secs < 3600)   return Math.floor(secs / 60) + 'm ago';
  if (secs < 86400)  return Math.floor(secs / 3600) + 'h ago';
  if (secs < 604800) return Math.floor(secs / 86400) + 'd ago';
  return Math.floor(secs / 604800) + 'w ago';
}

function colorForId(id) {
  let h = 0;
  const s = String(id || 'x');
  for (let i = 0; i < s.length; i++) h = (Math.imul(31, h) + s.charCodeAt(i)) | 0;
  return AVATAR_COLORS[Math.abs(h) % AVATAR_COLORS.length];
}

supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
  auth: { detectSessionInUrl: true }
});
const params    = new URLSearchParams(location.search);
const targetUid = params.get('uid');
let viewBagDiscs = [];
let viewBagPrefDist = null;
let viewBagFcPositions = null;
const pageMsg   = document.getElementById('page-msg');
const bagWrap   = document.getElementById('bag-wrap');

function showError(msg) {
  pageMsg.innerHTML = '<strong>Not Found</strong>' + esc(msg);
  pageMsg.style.display = '';
  bagWrap.style.display = 'none';
}

if (!targetUid) {
  showError('No bag specified. Go back to Community.');
} else {
  let currentUser = null;
  let bagData     = null;
  let liked       = false;
  let likeCount   = 0;

  const loginUrl = 'login.html?from=' + encodeURIComponent('view-bag.html?uid=' + targetUid);

  function applyAuthNav(user) {
    currentUser = user;

    const navAuth     = document.getElementById('nav-auth');
    const navProfile  = document.getElementById('nav-profile');
    const navAuthM    = document.getElementById('nav-auth-mobile');
    const navProfileM = document.getElementById('nav-profile-mobile');
    if (currentUser) {
      if (navProfile)  navProfile.style.display  = '';
      if (navProfileM) navProfileM.style.display = '';
      if (navAuth)  { navAuth.textContent  = 'Sign Out'; navAuth.href  = '#'; navAuth.onclick  = e => { e.preventDefault(); signOutAndRedirect(supabase, 'index.html'); }; }
      if (navAuthM) { navAuthM.textContent = 'Sign Out'; navAuthM.href = '#'; navAuthM.onclick = e => { e.preventDefault(); signOutAndRedirect(supabase, 'index.html'); }; }
    } else {
      if (navProfile)  navProfile.style.display  = 'none';
      if (navProfileM) navProfileM.style.display = 'none';
      if (navAuth)  { navAuth.textContent  = 'Sign In'; navAuth.href  = loginUrl; navAuth.onclick  = null; }
      if (navAuthM) { navAuthM.textContent = 'Sign In'; navAuthM.href = loginUrl; navAuthM.onclick = null; }
    }

    if (bagData) {
      liked = currentUser ? (bagData.liked_by || []).includes(currentUser.id) : false;
      updateLikeBtn();
      updateCommentInput();
    }
  }
  supabase.auth.onAuthStateChange((event, session) => applyAuthNav(session?.user ?? null));
  getSupabaseSession(supabase).then(session => applyAuthNav(session?.user ?? null));

  supabase.from('bags').select('*').eq('user_id', targetUid).single()
    .then(({ data, error }) => {
      if (error || !data) { showError("This bag doesn't exist."); return; }
      if (!data.prefs || !data.prefs.public) { showError('This bag is private.'); return; }
      bagData   = data;
      likeCount = data.like_count || 0;
      liked     = currentUser ? (data.liked_by || []).includes(currentUser.id) : false;
      renderBag(data);
      loadComments();
      pageMsg.style.display = 'none';
      bagWrap.style.display = '';
      if (params.get('fc') === '1' && window._openViewFC) window._openViewFC();
    }).catch(e => {
      showError('Could not load bag. ' + (e.message || 'Check your connection.'));
    });

  function renderBag(data) {
    const discs  = decodeBagKeys(data.bag || []);
    const prefs  = data.prefs || {};
    viewBagDiscs       = discs;
    viewBagPrefDist    = prefs.dist ? parseInt(prefs.dist) : null;
    viewBagFcPositions = prefs.fcPositions || null;
    const name   = data.display_name || 'Anonymous';
    const color  = AVATAR_COLORS.find(c => c.val === prefs.avatarColor) || AVATAR_COLORS[0];
    const ago    = timeAgo(data.updated_at);

    const avatarHtml = prefs.avatarPhoto
      ? `<div class="owner-avatar" style="border:2px solid ${color.border}"><img src="${esc(prefs.avatarPhoto)}" alt=""></div>`
      : `<div class="owner-avatar" style="background:${color.bg};border:2px solid ${color.border};color:${color.val}">${esc(name[0].toUpperCase())}</div>`;

    const typeCounts = {};
    for (const d of discs) typeCounts[d.type] = (typeCounts[d.type] || 0) + 1;
    const breakdownHtml = TYPE_CONFIG
      .filter(t => typeCounts[t.key])
      .map(t => `<span class="breakdown-item breakdown-${t.cls}">${typeCounts[t.key]} ${t.label.split(' ')[0]}</span>`)
      .join('') + `<span class="breakdown-item breakdown-total">${discs.length} total</span>`;

    document.getElementById('bag-header').innerHTML = `
      <div class="owner-row">
        ${avatarHtml}
        <div>
          <div class="owner-name">${esc(name)}</div>
          ${ago ? `<div class="owner-meta">Updated ${ago}</div>` : ''}
        </div>
      </div>
      <div class="disc-breakdown">${breakdownHtml}</div>
      <div class="bag-actions">
        <button class="like-btn" id="like-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
          <span id="like-label">Like</span>
        </button>
        <button class="fc-open-btn" id="fc-btn">Flight Charts</button>
      </div>`;

    document.getElementById('like-btn').addEventListener('click', toggleLike);
    document.getElementById('fc-btn').addEventListener('click', () => window._openViewFC && window._openViewFC());
    updateLikeBtn();

    let sectionsHtml = '';
    for (const tc of TYPE_CONFIG) {
      const group = discs.filter(d => d.type === tc.key);
      if (!group.length) continue;
      const nameCounts = {};
      for (const d of group) nameCounts[d.name] = (nameCounts[d.name] || 0) + 1;
      const rows = Object.keys(nameCounts).map(dname => {
        const disc = group.find(d => d.name === dname);
        const qty  = nameCounts[dname];
        return `<div class="disc-row">
          <div>
            <span class="disc-name">${esc(dname)}</span>
            <span class="disc-brand"> — ${esc(disc.brand)}</span>
          </div>
          ${qty > 1 ? `<span class="disc-qty">×${qty}</span>` : ''}
        </div>`;
      }).join('');
      sectionsHtml += `
        <div class="disc-section">
          <div class="disc-section-hdr">
            <span class="disc-section-dot" style="background:${tc.color}"></span>
            <span class="disc-section-label">${tc.label}</span>
            <span class="disc-section-count">${group.length}</span>
          </div>
          <div class="disc-list">${rows}</div>
        </div>`;
    }
    document.getElementById('disc-sections').innerHTML = sectionsHtml;
  }

  function updateLikeBtn() {
    const btn = document.getElementById('like-btn');
    const lbl = document.getElementById('like-label');
    if (!btn || !lbl) return;
    lbl.textContent = (likeCount > 0 ? likeCount + ' ' : '') + (liked ? 'Liked' : 'Like');
    const svg = btn.querySelector('svg');
    if (svg) svg.setAttribute('fill', liked ? 'currentColor' : 'none');
    btn.classList.toggle('liked', liked);
  }

  function toggleLike() {
    if (!currentUser) { location.href = loginUrl; return; }
    if (!bagData) return;
    const wasLiked  = liked;
    const prevCount = likeCount;

    liked     = !wasLiked;
    likeCount = Math.max(0, prevCount + (liked ? 1 : -1));
    updateLikeBtn();

    supabase.rpc('toggle_like', { p_bag_user_id: targetUid, p_user_id: currentUser.id })
      .then(({ error }) => {
        if (error) {
          liked     = wasLiked;
          likeCount = prevCount;
          updateLikeBtn();
          console.warn('Like failed:', error.message);
        }
      });
  }

  async function loadComments() {
    const { data: comments, error } = await supabase
      .from('comments')
      .select('*')
      .eq('bag_user_id', targetUid)
      .order('created_at', { ascending: true });
    if (error) {
      document.getElementById('comment-list').innerHTML =
        '<div class="no-comments">Comments unavailable.</div>';
    } else {
      renderComments(comments || []);
    }
    updateCommentInput();
  }

  function renderComments(comments) {
    const el      = document.getElementById('comment-list');
    const countEl = document.getElementById('comment-count');
    if (countEl) countEl.textContent = comments.length;
    if (!comments.length) { el.innerHTML = '<div class="no-comments">No comments yet. Be the first!</div>'; return; }

    const roots = comments.filter(c => !c.parent_id);
    const replyMap = {};
    comments.filter(c => c.parent_id).forEach(r => {
      (replyMap[r.parent_id] = replyMap[r.parent_id] || []).push(r);
    });

    el.innerHTML = roots.map(c => {
      const replies = replyMap[c.id] || [];
      const repliesHtml = replies.length
        ? `<div class="comment-replies">${replies.map(replyHtml).join('')}</div>` : '';
      return `<div class="comment-thread" data-id="${esc(c.id || '')}">${topLevelCommentHtml(c)}${repliesHtml}</div>`;
    }).join('');

    el.querySelectorAll('.comment-reply-btn').forEach(btn => {
      btn.addEventListener('click', () => showReplyForm(btn.closest('.comment-thread')));
    });
  }

  function topLevelCommentHtml(c) {
    const authorName = c.author_name || 'Anonymous';
    const color = colorForId(c.author_id || authorName);
    const ago   = timeAgo(c.created_at);
    const replyBtn = currentUser ? `<button class="comment-reply-btn">Reply</button>` : '';
    return `<div class="comment">
      <div class="comment-avatar" style="background:${color.bg};border:1.5px solid ${color.border};color:${color.val}">${esc(authorName[0].toUpperCase())}</div>
      <div class="comment-body">
        <div class="comment-meta">
          <span class="comment-author">${esc(authorName)}</span>
          ${ago ? `<span class="comment-time">${ago}</span>` : ''}
        </div>
        <div class="comment-text">${esc(c.text)}</div>
        ${replyBtn}
      </div>
    </div>`;
  }

  function replyHtml(c) {
    const authorName = c.author_name || 'Anonymous';
    const color = colorForId(c.author_id || authorName);
    const ago   = timeAgo(c.created_at);
    return `<div class="reply">
      <div class="reply-avatar" style="background:${color.bg};border:1.5px solid ${color.border};color:${color.val}">${esc(authorName[0].toUpperCase())}</div>
      <div class="comment-body">
        <div class="comment-meta">
          <span class="comment-author">${esc(authorName)}</span>
          ${ago ? `<span class="comment-time">${ago}</span>` : ''}
        </div>
        <div class="comment-text">${esc(c.text)}</div>
      </div>
    </div>`;
  }

  function showReplyForm(thread) {
    const existing = thread.querySelector('.reply-form-wrap');
    if (existing) { existing.remove(); return; }
    document.querySelectorAll('.reply-form-wrap').forEach(f => f.remove());

    const parentId = thread.dataset.id;
    const wrap = document.createElement('div');
    wrap.className = 'reply-form-wrap';
    wrap.innerHTML = `
      <textarea class="comment-textarea" placeholder="Write a reply…" rows="1" style="font-size:12px;min-height:32px"></textarea>
      <button class="comment-submit" disabled style="font-size:12px;padding:6px 12px">Reply</button>`;
    thread.appendChild(wrap);

    const ta  = wrap.querySelector('textarea');
    const btn = wrap.querySelector('button');
    ta.focus();
    ta.addEventListener('input', () => {
      ta.style.height = 'auto';
      ta.style.height = Math.min(ta.scrollHeight, 120) + 'px';
      btn.disabled = !ta.value.trim();
    });
    btn.addEventListener('click', () => postReply(parentId, thread, wrap));
  }

  async function postReply(parentId, thread, wrap) {
    const ta  = wrap.querySelector('textarea');
    const btn = wrap.querySelector('button');
    const text = ta.value.trim();
    if (!text || !currentUser) return;

    const authorName = currentUser.user_metadata?.displayName ||
      currentUser.user_metadata?.full_name ||
      currentUser.email.split('@')[0] || 'Anonymous';

    ta.disabled = true; btn.disabled = true; btn.textContent = 'Posting…';

    const { error } = await supabase.from('comments').insert({
      bag_user_id: targetUid, text,
      author_id: currentUser.id, author_name: authorName,
      parent_id: parentId, created_at: new Date().toISOString(),
    });

    if (!error) {
      await supabase.rpc('increment_comment_count', { p_bag_user_id: targetUid });
      let repliesDiv = thread.querySelector('.comment-replies');
      if (!repliesDiv) {
        repliesDiv = document.createElement('div');
        repliesDiv.className = 'comment-replies';
        thread.insertBefore(repliesDiv, wrap);
      }
      repliesDiv.insertAdjacentHTML('beforeend', replyHtml({
        text, author_id: currentUser.id, author_name: authorName,
        created_at: new Date().toISOString(),
      }));
      const countEl = document.getElementById('comment-count');
      if (countEl) countEl.textContent = parseInt(countEl.textContent || '0') + 1;
      wrap.remove();
    } else {
      ta.disabled = false; btn.disabled = false; btn.textContent = 'Reply';
    }
  }

  function updateCommentInput() {
    const el = document.getElementById('comment-input');
    if (!el) return;
    if (currentUser) {
      el.innerHTML = `
        <div class="comment-form-wrap">
          <textarea class="comment-textarea" id="comment-textarea" placeholder="Add a comment…" rows="1"></textarea>
          <button class="comment-submit" id="comment-submit" disabled>Post</button>
        </div>
        <div id="comment-error" style="padding:0 1.25rem 0.6rem;font-size:12px;color:#f85149;min-height:0"></div>`;
      const ta  = document.getElementById('comment-textarea');
      const btn = document.getElementById('comment-submit');
      ta.addEventListener('input', () => {
        ta.style.height = 'auto';
        ta.style.height = Math.min(ta.scrollHeight, 120) + 'px';
        btn.disabled = !ta.value.trim();
      });
      btn.addEventListener('click', postComment);
    } else {
      el.innerHTML = `<div class="sign-in-prompt"><a href="${loginUrl}">Sign in</a> to leave a comment.</div>`;
    }
  }

  async function postComment() {
    const ta  = document.getElementById('comment-textarea');
    const btn = document.getElementById('comment-submit');
    if (!ta || !currentUser) return;
    const text = ta.value.trim();
    if (!text) return;

    const authorName = currentUser.user_metadata?.displayName ||
      currentUser.user_metadata?.full_name ||
      currentUser.email.split('@')[0] || 'Anonymous';

    ta.disabled = true;
    btn.disabled = true;
    btn.textContent = 'Posting…';

    const { error } = await supabase.from('comments').insert({
      bag_user_id: targetUid,
      text,
      author_id: currentUser.id,
      author_name: authorName,
      created_at: new Date().toISOString(),
    });

    if (!error) {
      await supabase.rpc('increment_comment_count', { p_bag_user_id: targetUid });

      const list  = document.getElementById('comment-list');
      const empty = list.querySelector('.no-comments');
      if (empty) list.innerHTML = '';

      const thread = document.createElement('div');
      thread.className = 'comment-thread';
      const fakeComment = { text, author_id: currentUser.id, author_name: authorName, created_at: new Date().toISOString() };
      thread.innerHTML = topLevelCommentHtml(fakeComment);
      list.appendChild(thread);
      thread.querySelector('.comment-reply-btn')?.addEventListener('click', () => showReplyForm(thread));

      const countEl = document.getElementById('comment-count');
      if (countEl) countEl.textContent = parseInt(countEl.textContent || '0') + 1;

      ta.value = '';
      ta.style.height = 'auto';
      ta.disabled = false;
      btn.textContent = 'Post';
      btn.disabled = true;
    } else {
      ta.disabled = false;
      btn.disabled = false;
      btn.textContent = 'Post';
      const errEl = document.getElementById('comment-error');
      if (errEl) {
        errEl.textContent = 'Failed to post comment. Please try again.';
        setTimeout(() => { errEl.textContent = ''; }, 6000);
      }
    }
  }
}
</script>

<div class="fc-overlay" id="fc-overlay" style="display:none">
  <div class="fc-dialog">
    <div class="fc-hdr">
      <span class="fc-title">Flight Charts</span>
      <button class="fc-close" id="fc-close">×</button>
    </div>
    <div class="fc-throw-bar" id="fc-throw-toggle">
      <button class="fc-throw-btn active" data-throw="rhbh">RHBH / LHFH</button>
      <button class="fc-throw-btn" data-throw="rhfh">RHFH / LHBH</button>
    </div>
    <div class="fc-body" id="fc-body"></div>
  </div>
</div>

<script>
(function() {
  const W = 660, H = 545, OX = 300, OY = 505;
  const STAB = {
    'very overstable':  { lat:-0.58, color:'#f78166', abbr:'VOS', lx:-1,    ly:-0.10, anchor:'end' },
    'overstable':       { lat:-0.35, color:'#d29922', abbr:'OS',  lx:-0.85, ly:-0.53, anchor:'end' },
    'neutral':          { lat: 0,    color:'#39d353', abbr:'NE',  lx: 0,    ly:-1,    anchor:'middle' },
    'understable':      { lat:+0.35, color:'#58a6ff', abbr:'US',  lx: 0.85, ly:-0.53, anchor:'start' },
    'very understable': { lat:+0.58, color:'#a371f7', abbr:'VUS', lx: 1,    ly:-0.10, anchor:'start' },
  };
  const CP = {
    'very overstable':  { cp1dx:  0,    cp1t:0.72, cp2dx:+0.20, cp2t:0.07 },
    'overstable':       { cp1dx:  0,    cp1t:0.70, cp2dx:+0.12, cp2t:0.10 },
    'neutral-short':    { cp1dx:  0,    cp1t:0.50, cp2dx:  0,   cp2t:0.50 },
    'neutral-long':     { cp1dx:+0.07,  cp1t:0.42, cp2dx:+0.05, cp2t:0.35 },
    'understable':      { cp1dx:  0,    cp1t:0.65, cp2dx:-0.06, cp2t:0.15 },
    'very understable': { cp1dx:+0.04,  cp1t:0.58, cp2dx:-0.12, cp2t:0.15 },
  };
  const CATS = [
    { abbr:'Putt', typeKey:'putter',   label:'Putters',         endY:303, stabs:['overstable','neutral','understable'],                                                      lblDist:26 },
    { abbr:'Mid',  typeKey:'midrange', label:'Midranges',        endY:213, stabs:['very overstable','overstable','neutral','understable','very understable'], lblDist:16 },
    { abbr:'FW',   typeKey:'fairway',  label:'Fairway Drivers',  endY:123, stabs:['very overstable','overstable','neutral','understable','very understable'], lblDist:16 },
    { abbr:'Dist', typeKey:'distance', label:'Distance Drivers', endY: 55, stabs:['very overstable','overstable','neutral','understable','very understable'], lblDist:16 },
  ];
  const BASE_DMULT = {
    'very overstable':0.68,'overstable':0.85,'neutral':1.00,'understable':1.02,'very understable':0.97,
  };
  const LEGEND = [
    { color:'#f78166', label:'Very Overstable', x: 90 },
    { color:'#d29922', label:'Overstable',       x:205 },
    { color:'#39d353', label:'Neutral',           x:315 },
    { color:'#58a6ff', label:'Understable',       x:390 },
    { color:'#a371f7', label:'Very Understable',  x:480 },
  ];

  let _fcMirror = false;

  function getArrowLabels() {
    const labels = {};
    if (viewBagFcPositions) {
      Object.entries(viewBagFcPositions).forEach(([posStr, arrowKey]) => {
        const disc = viewBagDiscs[parseInt(posStr)];
        if (!disc) return;
        if (!labels[arrowKey]) labels[arrowKey] = [];
        labels[arrowKey].push(disc.name);
      });
    }
    return labels;
  }

  function buildSVG(maxDist, typeFilter, arrowLabels) {
    arrowLabels = arrowLabels || {};
    const r = v => v.toFixed(1);
    const m = _fcMirror ? -1 : 1;
    const flipAnchor = a => _fcMirror ? (a === 'end' ? 'start' : a === 'start' ? 'end' : 'middle') : a;
    const MAX_VERT = OY - 55;
    let s = `<svg viewBox="0 0 ${W} ${H}" width="100%" xmlns="http://www.w3.org/2000/svg">`;
    s += `<line x1="${OX}" y1="${OY}" x2="${OX}" y2="12" stroke="rgba(255,255,255,0.18)" stroke-width="1" stroke-dasharray="3,5"/>`;
    for (let ft = 100; ft <= maxDist; ft += 100) {
      const y = r(OY - (ft / maxDist) * MAX_VERT);
      s += `<line x1="10" y1="${y}" x2="${W-10}" y2="${y}" stroke="rgba(255,255,255,0.22)" stroke-width="1" stroke-dasharray="5,4"/>`;
      s += `<text x="${W-14}" y="${r(parseFloat(y)-4)}" fill="rgba(255,255,255,0.65)" font-size="9.5" font-family="Barlow Condensed,sans-serif" font-weight="700" text-anchor="end">${ft} ft</text>`;
    }
    const visibleCATS = typeFilter && typeFilter !== 'all' ? CATS.filter(c => c.typeKey === typeFilter) : CATS;
    for (const { abbr: ca, endY: catEndY, stabs, lblDist } of visibleCATS) {
      const baseVert = OY - catEndY;
      const isLong = ca === 'FW' || ca === 'Dist';
      for (const key of stabs) {
        const { lat: _lat, color, abbr: sa, lx: _lx, ly, anchor: _anchor } = STAB[key];
        const lat = _lat * m, lx = _lx * m, anchor = flipAnchor(_anchor);
        const dmult = 1 - (1 - BASE_DMULT[key]) * Math.sqrt(baseVert / MAX_VERT);
        const vert = baseVert * dmult;
        const stabEndY = OY - vert;
        const cpKey = key === 'neutral' ? (isLong ? 'neutral-long' : 'neutral-short') : key;
        const { cp1dx: _cp1dx, cp1t, cp2dx: _cp2dx, cp2t } = CP[cpKey];
        const cp1dx = _cp1dx * m, cp2dx = _cp2dx * m;
        const ex = OX + lat * vert;
        const cp1x = OX + cp1dx * vert, cp1y = OY - cp1t * vert;
        const cp2x = ex + cp2dx * vert, cp2y = stabEndY + cp2t * vert;
        const dx = ex - cp2x, dy = stabEndY - cp2y;
        const len = Math.sqrt(dx*dx + dy*dy) || 1;
        const nx = dx/len, ny = dy/len;
        const sz = 4.5, px = -ny*sz, py = nx*sz;
        const bx = ex - nx*sz*1.8, by = stabEndY - ny*sz*1.8;
        s += `<path d="M ${OX} ${OY} C ${r(cp1x)} ${r(cp1y)}, ${r(cp2x)} ${r(cp2y)}, ${r(ex)} ${r(stabEndY)}" fill="none" stroke="${color}" stroke-width="1.8" stroke-linecap="round" opacity="0.85"/>`;
        s += `<polygon points="${r(ex)},${r(stabEndY)} ${r(bx+px)},${r(by+py)} ${r(bx-px)},${r(by-py)}" fill="${color}" opacity="0.85"/>`;
        const lbx = ex + lx * lblDist, lby = stabEndY + ly * lblDist;
        const arrowKey = `${ca}-${sa}`;
        const rawLabel = arrowLabels[arrowKey];
        const displayNames = Array.isArray(rawLabel) && rawLabel.length ? rawLabel : [arrowKey];
        if (displayNames.length === 1) {
          s += `<text x="${r(lbx)}" y="${r(lby+3)}" fill="${color}" font-size="8.5" font-family="Barlow,sans-serif" font-weight="700" text-anchor="${anchor}" opacity="0.9">${displayNames[0]}</text>`;
        } else {
          const lh = 9, sy = lby + 3 - (displayNames.length - 1) * lh / 2;
          s += `<text fill="${color}" font-size="8.5" font-family="Barlow,sans-serif" font-weight="700" text-anchor="${anchor}" opacity="0.9">`;
          displayNames.forEach((nm, i) => { s += `<tspan x="${r(lbx)}" y="${r(sy + i * lh)}">${nm}</tspan>`; });
          s += `</text>`;
        }
      }
    }
    s += `<circle cx="${OX}" cy="${OY}" r="4" fill="rgba(255,255,255,0.3)"/>`;
    s += `<text x="${OX}" y="${OY+14}" fill="rgba(255,255,255,0.28)" font-size="8.5" font-family="Barlow Condensed,sans-serif" font-weight="700" text-anchor="middle" letter-spacing="0.06em">THROW ORIGIN</text>`;
    s += `<text x="10" y="${H-12}" fill="rgba(255,255,255,0.3)" font-size="8" font-family="Barlow,sans-serif" font-weight="700">STABILITY:</text>`;
    for (const { color, label, x } of LEGEND) {
      s += `<circle cx="${x}" cy="${H-15}" r="4" fill="${color}" opacity="0.75"/>`;
      s += `<text x="${x+8}" y="${H-11}" fill="${color}" font-size="8" font-family="Barlow,sans-serif" font-weight="700" opacity="0.75">${label}</text>`;
    }
    s += '</svg>';
    return s;
  }

  function openFC() {
    const body = document.getElementById('fc-body');
    const initDist = viewBagPrefDist || 300;
    let fcFilter = 'all';
    const arrowLabels = getArrowLabels();
    document.querySelectorAll('.fc-throw-btn').forEach(b => b.classList.toggle('active', b.dataset.throw === (_fcMirror ? 'rhfh' : 'rhbh')));

    const FC_TYPES = ['all','putter','midrange','fairway','distance'];
    const FC_LABELS = { all:'All', putter:'Putters', midrange:'Midranges', fairway:'Fairways', distance:'Distance' };
    const tabsHtml = `<div class="fc-type-tabs" id="fc-type-tabs">
      ${FC_TYPES.map(t => `<button class="fc-type-tab${fcFilter === t ? ' active' : ''}" data-fc-type="${t}">${FC_LABELS[t]}</button>`).join('')}
    </div>`;

    if (viewBagPrefDist) {
      body.innerHTML = `${tabsHtml}<div style="padding-bottom:1rem"><span class="fc-dist-label">Throw distance from profile: <strong style="color:var(--text)">${viewBagPrefDist} ft</strong></span></div><div id="fc-chart"></div>`;
    } else {
      body.innerHTML = `${tabsHtml}<div style="padding-bottom:1rem">
        <span class="fc-dist-label">Max throw distance</span>
        <div class="fc-dist-ctrl">
          <button class="fc-step-btn" id="fc-dec">−</button>
          <input class="fc-slider" type="range" id="fc-slider" min="100" max="500" step="25" value="${initDist}">
          <button class="fc-step-btn" id="fc-inc">+</button>
        </div>
        <div class="fc-dist-val"><span id="fc-dist-num">${initDist}</span> ft</div>
      </div><div id="fc-chart"></div>`;
      document.getElementById('fc-slider').addEventListener('input', function() {
        document.getElementById('fc-dist-num').textContent = this.value;
        document.getElementById('fc-chart').innerHTML = buildSVG(parseInt(this.value), fcFilter, arrowLabels);
      });
      document.getElementById('fc-dec').addEventListener('click', () => {
        const sl = document.getElementById('fc-slider');
        sl.value = Math.max(100, parseInt(sl.value) - 25);
        sl.dispatchEvent(new Event('input'));
      });
      document.getElementById('fc-inc').addEventListener('click', () => {
        const sl = document.getElementById('fc-slider');
        sl.value = Math.min(500, parseInt(sl.value) + 25);
        sl.dispatchEvent(new Event('input'));
      });
    }

    document.getElementById('fc-type-tabs').addEventListener('click', e => {
      const btn = e.target.closest('[data-fc-type]');
      if (!btn) return;
      fcFilter = btn.dataset.fcType;
      document.querySelectorAll('.fc-type-tab').forEach(b => b.classList.toggle('active', b === btn));
      const dist = viewBagPrefDist || parseInt(document.getElementById('fc-slider')?.value || initDist);
      document.getElementById('fc-chart').innerHTML = buildSVG(dist, fcFilter, arrowLabels);
    });

    document.getElementById('fc-chart').innerHTML = buildSVG(initDist, fcFilter, arrowLabels);
    document.getElementById('fc-overlay').style.display = 'flex';
  }

  function closeFC() { document.getElementById('fc-overlay').style.display = 'none'; }

  window._openViewFC = openFC;

  document.getElementById('fc-throw-toggle').addEventListener('click', e => {
    const btn = e.target.closest('[data-throw]');
    if (!btn) return;
    _fcMirror = btn.dataset.throw === 'rhfh';
    document.querySelectorAll('.fc-throw-btn').forEach(b => b.classList.toggle('active', b === btn));
    const chart = document.getElementById('fc-chart');
    if (!chart) return;
    const arrowLabels = getArrowLabels();
    const dist = viewBagPrefDist || parseInt(document.getElementById('fc-slider')?.value || 300);
    chart.innerHTML = buildSVG(dist, document.querySelector('.fc-type-tab.active')?.dataset?.fcType || 'all', arrowLabels);
  });

  document.getElementById('fc-close').addEventListener('click', closeFC);
  document.getElementById('fc-overlay').addEventListener('click', e => { if (e.target === document.getElementById('fc-overlay')) closeFC(); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape' && document.getElementById('fc-overlay').style.display !== 'none') closeFC(); });
})();
</script>

<script>
(function() {
  var ham  = document.getElementById('hamburger-btn');
  var menu = document.getElementById('mobile-menu');
  ham.addEventListener('click', function(e) { e.stopPropagation(); menu.classList.toggle('open'); });
  document.addEventListener('click', function(e) {
    if (!e.target.closest('#mobile-menu') && !e.target.closest('#hamburger-btn')) menu.classList.remove('open');
  });
  menu.querySelectorAll('a').forEach(function(a) { a.addEventListener('click', function() { menu.classList.remove('open'); }); });
})();
</script>

</body>
</html>
