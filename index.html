<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Disc Golf Bag Builder</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
    :root {
      --bg: #0d1117;
      --bg2: #161b22;
      --bg3: #21262d;
      --border: rgba(255,255,255,0.08);
      --border2: rgba(255,255,255,0.14);
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #39d353;
      --accent2: #58a6ff;
      --innova: #e05c2a;
      --discraft: #58a6ff;
      --putter: #3fb950;
      --midrange: #d29922;
      --fairway: #a371f7;
      --distance: #f78166;
    }
 
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Barlow', sans-serif;
      min-height: 100vh;
      margin: 0;
      padding: 0;
    }
 
    /* HEADER */
    header {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.02em;
      color: var(--text);
    }
    .logo span { color: var(--accent); }
    .header-sub { font-size: 13px; color: var(--muted); }
 
    /* HERO */
    .hero {
      background: linear-gradient(135deg, #0d1117 0%, #161b22 50%, #0d1117 100%);
      padding: 3rem 2rem 2rem;
      text-align: center;
      border-bottom: 1px solid var(--border);
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 60% 50% at 50% 0%, rgba(57,211,83,0.07) 0%, transparent 70%);
      pointer-events: none;
    }
    .hero h1 {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(2rem, 6vw, 3.5rem);
      font-weight: 700;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      line-height: 1;
      margin-bottom: 10px;
    }
    .hero h1 em { color: var(--accent); font-style: normal; }
    .hero p { font-size: 15px; color: var(--muted); max-width: 480px; margin: 0 auto; }
 
    /* CONTROLS */
    .controls {
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem 1.5rem 0;
    }
    .control-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.25rem;
      margin-bottom: 1.25rem;
    }
    @media (max-width: 600px) { .control-row { grid-template-columns: 1fr; } }
 
    .control-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.1rem 1.25rem;
    }
    .control-card label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      display: block;
      margin-bottom: 10px;
    }
    .dist-display {
      display: flex;
      align-items: baseline;
      gap: 6px;
      margin-bottom: 10px;
    }
    .dist-display .num {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 36px;
      font-weight: 700;
      color: var(--accent);
      line-height: 1;
    }
    .dist-display .unit { font-size: 14px; color: var(--muted); }
 
    input[type=range] {
      -webkit-appearance: none;
      width: 100%;
      height: 4px;
      background: var(--bg3);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px; height: 18px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
      transition: transform 0.1s;
    }
    input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.2); }
    .range-labels {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: var(--muted);
      margin-top: 6px;
    }
 
    .btn-group { display: flex; flex-direction: column; gap: 6px; }
    .btn-row { display: flex; gap: 6px; }
    .filter-btn {
      flex: 1;
      padding: 7px 10px;
      font-family: 'Barlow', sans-serif;
      font-size: 13px;
      font-weight: 500;
      border-radius: 6px;
      border: 1px solid var(--border2);
      background: var(--bg3);
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
      text-align: center;
    }
    .filter-btn:hover { border-color: rgba(255,255,255,0.25); color: var(--text); }
    .filter-btn.active.skill {
      background: rgba(57,211,83,0.12);
      border-color: rgba(57,211,83,0.4);
      color: var(--accent);
    }
    .filter-btn.active.brand-innova {
      background: rgba(224,92,42,0.12);
      border-color: rgba(224,92,42,0.4);
      color: var(--innova);
    }
    .filter-btn.active.brand-discraft {
      background: rgba(88,166,255,0.12);
      border-color: rgba(88,166,255,0.4);
      color: var(--discraft);
    }
    .filter-btn.active.brand-both {
      background: rgba(163,113,247,0.12);
      border-color: rgba(163,113,247,0.4);
      color: #a371f7;
    }
 
    /* STATS ROW */
    .stats-row {
      display: flex;
      gap: 10px;
      max-width: 900px;
      margin: 1.25rem auto 0;
      padding: 0 1.5rem;
    }
    .stat-pill {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 5px 12px;
      font-size: 12px;
      color: var(--muted);
    }
    .stat-pill .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
    }
    .stat-pill strong { color: var(--text); }
 
    /* BAG SECTION */
    .bag-section {
      max-width: 1200px;
      margin: 0 auto 0 0;
      padding: 2rem 1.5rem 4rem 0;
    }
    .type-group {
      display: inline-block;
      width: 23%;
      margin-right: 2%;
      vertical-align: top;
      margin-bottom: 2rem;
    }
    .type-group:last-child {
      margin-right: 0;
    }
    .type-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 1rem;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }
    .type-dot { width: 10px; height: 10px; border-radius: 50%; }
    .type-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text);
    }
    .type-count { font-size: 12px; color: var(--muted); margin-left: auto; }
 
    .disc-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }
    .disc-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1rem 1.1rem;
      transition: border-color 0.2s, transform 0.15s;
      cursor: default;
    }
    .disc-card:hover { border-color: var(--border2); transform: translateY(-1px); }
 
    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .brand-badge {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      padding: 2px 7px;
      border-radius: 4px;
    }
    .brand-badge.innova { background: rgba(224,92,42,0.15); color: var(--innova); }
    .brand-badge.discraft { background: rgba(88,166,255,0.15); color: var(--discraft); }
 
    .disc-name {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 19px;
      font-weight: 700;
      color: var(--text);
      line-height: 1;
      margin-bottom: 2px;
    }
 
    .flight-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 5px;
      margin-bottom: 10px;
    }
    .fnum {
      background: var(--bg3);
      border-radius: 6px;
      padding: 5px 4px;
      text-align: center;
    }
    .fnum .v {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 17px;
      font-weight: 700;
      display: block;
      line-height: 1;
    }
    .fnum .l {
      font-size: 9px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      display: block;
      margin-top: 2px;
    }
    .fnum.spd .v { color: var(--distance); }
    .fnum.gli .v { color: var(--accent); }
    .fnum.trn .v { color: var(--accent2); }
    .fnum.fad .v { color: #f78166; }
 
    .disc-desc { font-size: 12px; color: var(--muted); line-height: 1.5; }
 
    .stability-tag {
      display: inline-block;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding: 2px 7px;
      border-radius: 4px;
      margin-bottom: 8px;
    }
    .stability-tag.overstable { background: rgba(247,129,102,0.15); color: #f78166; }
    .stability-tag.understable { background: rgba(88,166,255,0.15); color: var(--accent2); }
    .stability-tag.neutral { background: rgba(57,211,83,0.12); color: var(--accent); }
 
    .empty-state {
      text-align: center;
      padding: 3rem;
      color: var(--muted);
    }
    .empty-state p { font-size: 14px; margin-top: 8px; }
 
    /* TIP BAR */
    .tip-bar {
      background: rgba(57,211,83,0.06);
      border: 1px solid rgba(57,211,83,0.15);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      color: #8bc8a0;
      margin-bottom: 1.5rem;
      line-height: 1.5;
    }
    .tip-bar strong { color: var(--accent); }
 
    footer {
      text-align: center;
      padding: 2rem;
      font-size: 12px;
      color: var(--muted);
      border-top: 1px solid var(--border);
    }
  </style>
</head>
<body>
 
<header>
  <div class="logo">Disc<span>Bag</span></div>
  <div class="header-sub">Innova &amp; Discraft Edition</div>
</header>
 
<div class="hero">
  <h1>Build Your <em>Perfect</em> Bag</h1>
  <p>Enter how far you throw — we'll pick the right discs to cover every shot.</p>
</div>
 
<div class="controls">
  <div class="control-row">
    <div class="control-card">
      <label>Backhand distance</label>
      <div class="dist-display">
        <span class="num" id="back-out">300</span>
        <span class="unit">feet</span>
      </div>
      <input type="range" id="back-slider" min="100" max="500" step="10" value="300" />
      <div class="range-labels"><span>100 ft</span><span>300 ft</span><span>500 ft</span></div>
    </div>
    <div class="control-card">
      <label>Forehand distance</label>
      <div class="dist-display">
        <span class="num" id="fore-out">300</span>
        <span class="unit">feet</span>
      </div>
      <input type="range" id="fore-slider" min="100" max="500" step="10" value="300" />
      <div class="range-labels"><span>100 ft</span><span>300 ft</span><span>500 ft</span></div>
    </div>
</div>
 
<div class="stats-row" id="stats-row"></div>
 
<div class="bag-section">
  <div id="bag-output"></div>
</div>
 
<footer>Flight numbers: Speed · Glide · Turn · Fade &nbsp;|&nbsp; Data based on manufacturer specs</footer>

const TYPE_ORDER = ["putter","midrange","fairway","distance"];
const TYPE_LABEL = { putter:"Putters", midrange:"Midranges", fairway:"Fairway Drivers", distance:"Distance Drivers" };
const TYPE_COLOR = { putter:"var(--putter)", midrange:"var(--midrange)", fairway:"var(--fairway)", distance:"var(--distance)" };
 
function getStability(turn, fade) {
  const val = turn + fade;
  if (val >= 3) return { label: "overstable", class: "overstable" };
  if (val <= 0) return { label: "understable", class: "understable" };
  return { label: "neutral", class: "neutral" };
}
 
let backDist = 300, foreDist = 300;

function getStabilityPreference() {
  // Map distance to stability: higher distance = more overstable preference
  // 100-500 range
  const backStability = (backDist - 100) / (500 - 100); // 0 to 1
  const foreStability = (foreDist - 100) / (500 - 100); // 0 to 1
  return (backStability + foreStability) / 2; // Average preference (0=understable, 1=overstable)
}

function getBag() {
  // Return all discs sorted by stability preference
  const eligible = DISCS.slice();
  
  const stabPref = getStabilityPreference();
  
  // Sort by how well they match stability preference
  eligible.sort((a, b) => {
    const aStab = a.turn; // Negative = understable, positive = overstable
    const bStab = b.turn;
    
    // Higher stabPref means we want more overstable (positive turn/fade)
    const targetStab = stabPref * 4 - 2; // Map stabPref to turn range (-2 to 2)
    const aDist = Math.abs(aStab - targetStab);
    const bDist = Math.abs(bStab - targetStab);
    
    return aDist - bDist;
  });
  
  // Separate by type
  const putters = eligible.filter(d => d.type === "putter" && d.speed >= 3);
  const midranges = eligible.filter(d => d.type === "midrange");
  const fairways = eligible.filter(d => d.type === "fairway");
  const distances = eligible.filter(d => d.type === "distance");
  
  // Curated 18-disc bag: 2 throwing putters, 5 midranges, 5 fairway drivers, 6 distance drivers
  const bag = [
    ...putters.slice(0, 2),
    ...midranges.slice(0, 5),
    ...fairways.slice(0, 5),
    ...distances.slice(0, 6)
  ];
  
  return bag;
}
 
function render() {
  const bag = getBag();
  const output = document.getElementById("bag-output");
  const statsRow = document.getElementById("stats-row");
 
  // Stats
  const counts = { putter:0, midrange:0, fairway:0, distance:0 };
  bag.forEach(d => counts[d.type]++);
  const dotColors = { putter:"var(--putter)", midrange:"var(--midrange)", fairway:"var(--fairway)", distance:"var(--distance)" };
  statsRow.innerHTML = Object.entries(counts).map(([type, count]) =>
    count > 0 ? `<div class="stat-pill"><div class="dot" style="background:${dotColors[type]}"></div><strong>${count}</strong> ${TYPE_LABEL[type].toLowerCase()}</div>` : ''
  ).join('');
 
  if (bag.length === 0) {
    output.innerHTML = '<div class="empty-state"><div style="font-size:2rem">🥏</div><p>No suitable discs found for your throwing capability. Try increasing your distance range.</p></div>';
    return;
  }
 
  output.innerHTML = TYPE_ORDER.map(type => {
    const discs = bag.filter(d => d.type === type);
    if (!discs.length) return '';
    return `
      <div class="type-group">
        <div class="type-header">
          <div class="type-dot" style="background:${TYPE_COLOR[type]}"></div>
          <span class="type-title">${TYPE_LABEL[type]}</span>
          <span class="type-count">${discs.length} disc${discs.length !== 1 ? 's' : ''}</span>
        </div>
        <div class="disc-grid">
          ${discs.map(d => {
            const stab = getStability(d.turn, d.fade);
            const fadeVal = d.fade !== undefined ? d.fade : (d.fare || 1);
            return `
              <div class="disc-card">
                <div class="card-top">
                  <span class="brand-badge ${d.brand}">${d.brand === 'innova' ? 'Innova' : 'Discraft'}</span>
                  <span class="stability-tag ${stab.class}">${stab.label}</span>
                </div>
                <div class="disc-name">${d.name}</div>
                <div class="flight-row">
                  <div class="fnum spd"><span class="v">${d.speed}</span><span class="l">Speed</span></div>
                  <div class="fnum gli"><span class="v">${d.glide}</span><span class="l">Glide</span></div>
                  <div class="fnum trn"><span class="v">${d.turn}</span><span class="l">Turn</span></div>
                  <div class="fnum fad"><span class="v">${fadeVal}</span><span class="l">Fade</span></div>
                </div>
                <div class="disc-desc">${d.desc}</div>
              </div>`;
          }).join('')}
        </div>
      </div>
    `;
  }).join('');
}

// Distance sliders
document.getElementById("back-slider").addEventListener("input", e => {
  backDist = parseInt(e.target.value);
  document.getElementById("back-out").textContent = backDist;
  render();
});

document.getElementById("fore-slider").addEventListener("input", e => {
  foreDist = parseInt(e.target.value);
  document.getElementById("fore-out").textContent = foreDist;
  render();
});

render();
</script>
