<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Community — Bag Creator</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet" />
  <script src="theme.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d1117; --bg2: #161b22; --bg3: #21262d;
      --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.14);
      --text: #e6edf3; --muted: #8b949e; --accent: #39d353;
    }
    [data-theme="light"] {
      --bg: #f6f8fa; --bg2: #ffffff; --bg3: #eaeef2;
      --border: rgba(0,0,0,0.09); --border2: rgba(0,0,0,0.16);
      --text: #1f2328; --muted: #57606a; --accent: #1a7f37; --accent2: #0969da;
    }
    [data-theme="light"] .hero { background: var(--bg2); }
    [data-theme="light"] .mobile-menu-link:hover { background: rgba(0,0,0,0.05); }
    body { background: var(--bg); color: var(--text); font-family: 'Barlow', sans-serif; min-height: 100vh; }

    header {
      background: var(--bg2); border-bottom: 1px solid var(--border);
      padding: 0 2rem; display: grid; grid-template-columns: 1fr auto 1fr;
      column-gap: 1.5rem; align-items: center; height: 64px;
      position: sticky; top: 0; z-index: 100;
    }
    .logo { font-family: 'Barlow Condensed', sans-serif; font-size: 22px; font-weight: 700; letter-spacing: 0.02em; color: var(--text); text-decoration: none; justify-self: start; }
    .logo span { color: var(--accent); }
    .nav-tabs { display: flex; gap: 6px; }
    .nav-right { display: flex; align-items: center; gap: 6px; justify-self: end; }
    .nav-link { font-size: 13px; font-weight: 600; color: var(--muted); text-decoration: none; letter-spacing: 0.05em; padding: 6px 16px; border: 1px solid var(--border2); border-radius: 6px; transition: all 0.15s; white-space: nowrap; display: inline-flex; align-items: center; height: 32px; }
    .nav-link:hover { color: var(--text); border-color: rgba(255,255,255,0.25); }
    .nav-link.active { background: rgba(57,211,83,0.12); border-color: rgba(57,211,83,0.4); color: var(--accent); }
    .nav-link-profile { display: inline-flex; align-items: center; gap: 7px; padding: 3px 14px 3px 5px; }
    .nav-avatar {
      width: 22px; height: 22px; border-radius: 50%;
      background: rgba(57,211,83,0.2); color: var(--accent);
      font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; flex-shrink: 0;
    }
    .nav-avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .mobile-menu-link.nav-link-profile { display: flex; align-items: center; gap: 9px; padding-left: 14px; }
    .mobile-menu-link .nav-avatar { width: 24px; height: 24px; font-size: 12px; }

    .hamburger-btn {
      display: none; grid-column: 3; grid-row: 1; justify-self: end;
      background: none; border: 1px solid var(--border2); border-radius: 6px;
      color: var(--muted); cursor: pointer; padding: 6px 12px;
      align-items: center; gap: 6px;
      font-family: 'Barlow', sans-serif; font-size: 12px; font-weight: 600; letter-spacing: 0.04em;
    }
    .hamburger-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.25); }
    .mobile-menu {
      display: none; flex-direction: column;
      position: fixed; top: 64px; left: 0; right: 0; z-index: 99;
      background: var(--bg2); border-bottom: 1px solid var(--border2);
      padding: 0.4rem 0.75rem 0.75rem;
    }
    .mobile-menu.open { display: flex; }
    .mobile-menu-link {
      display: block; width: 100%; text-align: left;
      padding: 10px 12px; font-family: 'Barlow', sans-serif; font-size: 13px; font-weight: 600;
      color: var(--muted); text-decoration: none; border-radius: 6px;
      letter-spacing: 0.04em; background: none; border: none; cursor: pointer;
      transition: background 0.12s, color 0.12s;
    }
    .mobile-menu-link:hover { background: rgba(255,255,255,0.05); color: var(--text); }
    .mobile-menu-link.active { color: var(--accent); }
    .mobile-menu-divider { height: 1px; background: var(--border); margin: 0.4rem 0; }
    @media (max-width: 768px) {
      header { padding: 0 1.25rem; }
      .nav-tabs { display: none; }
      .nav-right { display: none; }
      .hamburger-btn { display: flex; }
    }

    /* Page */
    .page { max-width: 680px; margin: 0 auto; padding: 2rem 1rem 4rem; }
    .page-head { margin-bottom: 1.75rem; }
    .page-title { font-family: 'Barlow Condensed', sans-serif; font-size: 1.75rem; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; }
    .page-sub { font-size: 13px; color: var(--muted); margin-top: 0.3rem; }

    /* Feed — single column */
    .feed { display: flex; flex-direction: column; gap: 1.5rem; }

    /* Card */
    .bag-card {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 12px;
      display: flex; flex-direction: column;
      max-width: 620px; width: 100%; margin: 0 auto;
      transition: border-color 0.15s;
    }
    .bag-card:hover { border-color: var(--border2); }

    /* Card header */
    .card-header {
      display: flex; align-items: center; gap: 0.75rem;
      padding: 0.9rem 1.1rem 0.85rem;
    }
    .card-avatar {
      width: 44px; height: 44px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Barlow Condensed', sans-serif; font-size: 19px; font-weight: 700;
      overflow: hidden;
    }
    .card-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; display: block; }
    .card-name { font-family: 'Barlow Condensed', sans-serif; font-size: 1.05rem; font-weight: 700; letter-spacing: 0.02em; }
    .card-updated { font-size: 11px; color: var(--muted); margin-top: 1px; }
    .card-pdga { font-size: 11px; font-weight: 600; color: var(--accent); text-decoration: none; letter-spacing: 0.03em; margin-top: 1px; display: block; opacity: 0.85; transition: opacity 0.12s; }
    .card-pdga:hover { opacity: 1; text-decoration: underline; }
    .card-header-timestamp { margin-left: auto; font-size: 11px; color: var(--muted); flex-shrink: 0; }

    /* Card body */
    .card-body { padding: 0 1.1rem 0.85rem; display: flex; flex-direction: column; gap: 0.65rem; }

    /* Breakdown badges */
    .disc-breakdown { display: flex; flex-wrap: wrap; gap: 0.4rem; align-items: center; }
    .breakdown-item {
      padding: 2px 8px; border-radius: 4px;
      font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 11.5px; letter-spacing: 0.04em;
      border: 1px solid;
    }
    .breakdown-putter   { color: #3fb950; border-color: rgba(63,185,80,0.25);   background: rgba(63,185,80,0.08);   }
    .breakdown-midrange { color: #d29922; border-color: rgba(210,153,34,0.25);  background: rgba(210,153,34,0.08);  }
    .breakdown-fairway  { color: #a371f7; border-color: rgba(163,113,247,0.25); background: rgba(163,113,247,0.08); }
    .breakdown-distance { color: #f78166; border-color: rgba(247,129,102,0.25); background: rgba(247,129,102,0.08); }
    .breakdown-total    { color: var(--muted); border-color: var(--border2); background: var(--bg3); margin-left: auto; }

    /* Disc chips */
    .disc-chips { display: flex; flex-wrap: wrap; gap: 5px; }
    .disc-chip {
      padding: 2px 7px; border-radius: 4px;
      background: var(--bg3); border: 1px solid var(--border);
      font-size: 11px; color: var(--muted);
    }
    .disc-chip-more { color: rgba(255,255,255,0.28); border-color: transparent; background: none; }

    /* Actions row */
    .card-actions {
      display: flex; align-items: center; gap: 0.75rem;
      padding: 0.65rem 1.1rem;
      border-top: 1px solid var(--border);
    }
    .action-btn {
      background: none; border: none; cursor: pointer;
      display: inline-flex; align-items: center; gap: 5px;
      color: var(--muted); font-family: 'Barlow', sans-serif; font-size: 13px; font-weight: 500;
      padding: 3px 0; transition: color 0.12s;
    }
    .action-btn:hover { color: var(--text); }
    .action-btn svg { width: 20px; height: 20px; flex-shrink: 0; transition: fill 0.12s, stroke 0.12s; }
    .like-btn.liked svg { stroke: #f85149; fill: rgba(248,81,73,0.18); }
    .like-btn.liked { color: #f85149; }
    .like-btn:hover svg { stroke: #f85149; }

    /* Likes line */
    .card-likes-line {
      padding: 0 1.1rem 0.55rem;
      font-size: 12px; font-weight: 600; color: var(--text);
    }

    /* Comments section */
    .card-comments {
      border-top: 1px solid var(--border);
      padding: 0.6rem 1.1rem 0.75rem;
      display: flex; flex-direction: column; gap: 0.35rem;
    }
    .card-comment-line { font-size: 13px; line-height: 1.45; }
    .card-comment-line .comment-author { font-weight: 600; margin-right: 0.4em; }
    .card-comment-line .comment-text { color: var(--text); }
    .card-view-comments {
      font-size: 12px; color: var(--muted); text-decoration: none; margin-top: 0.15rem;
      display: inline-block;
    }
    .card-view-comments:hover { color: var(--text); }

    /* States */
    .state-msg {
      text-align: center; padding: 4rem 2rem; color: var(--muted);
      font-size: 14px; line-height: 1.6;
    }
    .state-msg strong {
      display: block; font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.3rem; font-weight: 700; letter-spacing: 0.04em;
      text-transform: uppercase; color: var(--text); margin-bottom: 0.35rem;
    }
    .state-msg a { color: var(--accent); text-decoration: none; }
    .state-msg a:hover { text-decoration: underline; }

    .nav-help-btn { display: inline-flex; align-items: center; gap: 5px; background: none; cursor: pointer; }

    /* Help dialog */
    .help-overlay { position:fixed;inset:0;z-index:600;background:rgba(0,0,0,0.65);display:flex;align-items:center;justify-content:center;padding:1rem; }
    .help-dialog { background:var(--bg2);border:1px solid var(--border2);border-radius:14px;width:100%;max-width:420px;display:flex;flex-direction:column;overflow:hidden; }
    .help-header { display:flex;align-items:center;gap:8px;padding:1rem 1.25rem;border-bottom:1px solid var(--border);flex-shrink:0; }
    .help-hdr-title { font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;letter-spacing:.06em;text-transform:uppercase; }
    .help-counter { font-size:12px;color:var(--muted);margin-left:auto; }
    .help-close { background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer;padding:2px 5px;border-radius:4px;line-height:1; }
    .help-close:hover { color:var(--text);background:rgba(255,255,255,0.07); }
    .help-body { padding:2rem 1.5rem;text-align:center;flex:1; }
    .help-icon { font-size:2.5rem;margin-bottom:1rem;line-height:1; }
    .help-step-title { font-family:'Barlow Condensed',sans-serif;font-size:1.2rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin-bottom:.75rem; }
    .help-step-text { font-size:14px;color:var(--muted);line-height:1.65; }
    .help-footer { display:flex;align-items:center;justify-content:space-between;gap:.5rem;padding:.9rem 1.25rem;border-top:1px solid var(--border);flex-shrink:0; }
    .help-nav-btn { padding:7px 15px;font-family:'Barlow',sans-serif;font-size:13px;font-weight:600;border-radius:7px;border:1px solid var(--border2);background:var(--bg3);color:var(--muted);cursor:pointer;transition:all .15s;white-space:nowrap; }
    .help-nav-btn:hover { color:var(--text);border-color:rgba(255,255,255,.25); }
    .help-nav-btn:disabled { opacity:.3;cursor:default; }
    .help-nav-primary { background:rgba(57,211,83,.12);border-color:rgba(57,211,83,.4);color:var(--accent); }
    .help-nav-primary:hover { background:rgba(57,211,83,.22); }
    .help-dots { display:flex;gap:5px;align-items:center; }
    .help-dot { width:7px;height:7px;border-radius:50%;background:var(--border2);border:none;cursor:pointer;padding:0;transition:background .15s; }
    .help-dot.active { background:var(--accent); }
  </style>
</head>

    <h1 class="page-title">Community</h1>
    <p class="page-sub">Bags shared by BagCreator players — opt in from your <a href="profile.html" style="color:var(--accent);text-decoration:none">Profile</a></p>

<script src="supabase-config.js?v=2"></script>
<script src="discs.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const AVATAR_COLORS = [
  { val:'#39d353', bg:'rgba(57,211,83,0.15)',   border:'rgba(57,211,83,0.3)'   },
  { val:'#58a6ff', bg:'rgba(88,166,255,0.15)',  border:'rgba(88,166,255,0.3)'  },
  { val:'#a371f7', bg:'rgba(163,113,247,0.15)', border:'rgba(163,113,247,0.3)' },
  { val:'#ff79c6', bg:'rgba(255,121,198,0.15)', border:'rgba(255,121,198,0.3)' },
  { val:'#ffb800', bg:'rgba(255,184,0,0.15)',   border:'rgba(255,184,0,0.3)'   },
  { val:'#e05c2a', bg:'rgba(224,92,42,0.15)',   border:'rgba(224,92,42,0.3)'   },
  { val:'#f85149', bg:'rgba(248,81,73,0.15)',   border:'rgba(248,81,73,0.3)'   },
  { val:'#00d2d3', bg:'rgba(0,210,211,0.15)',   border:'rgba(0,210,211,0.3)'   },
];

function esc(s) {
  return String(s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function decodeBagKeys(keys) {
  if (!Array.isArray(keys)) return [];
  return keys.flatMap(key => {
    if (/^\d+$/.test(String(key))) {
      const d = DISCS[parseInt(key)];
      return d ? [d] : [];
    }
    const parts = String(key).split('|');
    const brand = parts[0], type = parts[1], name = parts.slice(2).join('|');
    const d = DISCS.find(x => x.brand === brand && x.type === type && x.name === name);
    return d ? [d] : [];
  });
}

function encodeBagIndices(discs) {
  return discs.map(d => DISCS.indexOf(d)).filter(i => i !== -1).join('-');
}

function timeAgo(ts) {
  if (!ts) return '';
  const secs = Math.floor((Date.now() - new Date(ts).getTime()) / 1000);
  if (secs < 60)     return 'just now';
  if (secs < 3600)   return Math.floor(secs / 60) + 'm ago';
  if (secs < 86400)  return Math.floor(secs / 3600) + 'h ago';
  if (secs < 604800) return Math.floor(secs / 86400) + 'd ago';
  return Math.floor(secs / 604800) + 'w ago';
}

const TYPE_ORDER = [
  { key:'putter',   label:'P',  cls:'putter'   },
  { key:'midrange', label:'M',  cls:'midrange' },
  { key:'fairway',  label:'FW', cls:'fairway'  },
  { key:'distance', label:'D',  cls:'distance' },
];

// Current signed-in user (populated after auth resolves)
let currentUser = null;

// Build the list of public bags for one row. Returns [{ bagId, bagName, discKeys, showName }].
function getPublicBagsForRow(d) {
  const prefs = d.prefs || {};
  const bags  = Array.isArray(prefs.bags) ? prefs.bags : [];
  const publicMap = prefs.publicBags && typeof prefs.publicBags === 'object' ? prefs.publicBags : null;
  if (publicMap && bags.length) {
    const pub = bags.filter(b => publicMap[b.id]);
    return pub.map(b => ({
      bagId: b.id,
      bagName: b.name || 'My Bag',
      discKeys: b.discs || [],
      showName: pub.length > 1,
    }));
  }
  // Legacy fallback: single shared bag from data.bag (no per-bag map yet)
  return [{
    bagId: null,
    bagName: 'My Bag',
    discKeys: d.bag || [],
    showName: false,
  }];
}

function renderCard(data, docId, bagInfo, commentsForCard, stats) {
  const discs = decodeBagKeys(bagInfo.discKeys || []);
  if (!discs.length) return '';

  const prefs = data.prefs || {};
  const name  = data.display_name || 'Anonymous';
  stats = stats || { likeCount: 0, isLiked: false, commentCount: 0 };
  const pdgaNumber = prefs.pdgaNumber || null;
  const color = AVATAR_COLORS.find(c => c.val === prefs.avatarColor) || AVATAR_COLORS[0];

  const avatarHtml = prefs.avatarPhoto
    ? `<div class="card-avatar" style="border:2px solid ${color.border}"><img src="${esc(prefs.avatarPhoto)}" alt=""></div>`
    : `<div class="card-avatar" style="background:${color.bg};border:2px solid ${color.border};color:${color.val}">${esc(name[0].toUpperCase())}</div>`;

  const typeCounts = {};
  for (const d of discs) typeCounts[d.type] = (typeCounts[d.type] || 0) + 1;

  const breakdownHtml = TYPE_ORDER
    .filter(t => typeCounts[t.key])
    .map(t => `<span class="breakdown-item breakdown-${t.cls}">${typeCounts[t.key]} ${t.label}</span>`)
    .join('') + `<span class="breakdown-item breakdown-total">${discs.length} total</span>`;

  const counts = {};
  for (const d of discs) counts[d.name] = (counts[d.name] || 0) + 1;
  const entries = Object.entries(counts);
  const SHOW = 10;
  const chips = entries.slice(0, SHOW).map(([dname, qty]) =>
    `<span class="disc-chip">${esc(dname)}${qty > 1 ? ` <span style="opacity:0.55">×${qty}</span>` : ''}</span>`
  ).join('');
  const more = entries.length > SHOW ? `<span class="disc-chip disc-chip-more">+${entries.length - SHOW} more</span>` : '';

  const viewHref = docId
    ? `view-bag.html?uid=${encodeURIComponent(docId)}${bagInfo.bagId ? `&bag=${encodeURIComponent(bagInfo.bagId)}` : ''}`
    : '#';
  const ago = timeAgo(data.updated_at);

  // Like state (per-bag)
  const likeCount = stats.likeCount || 0;
  const isLiked   = !!stats.isLiked;
  const likedClass = isLiked ? ' liked' : '';
  const bagIdAttr = bagInfo.bagId ? esc(bagInfo.bagId) : '';

  // Actions row
  const actionsHtml = `
    <div class="card-actions">
      <button class="action-btn like-btn${likedClass}" data-uid="${esc(docId)}" data-bag-id="${bagIdAttr}" data-liked="${isLiked ? '1' : '0'}" data-count="${likeCount}" aria-label="Like">
        <svg viewBox="0 0 24 24" fill="${isLiked ? 'rgba(248,81,73,0.18)' : 'none'}" stroke="${isLiked ? '#f85149' : 'currentColor'}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
        </svg>
        <span class="like-count">${likeCount}</span>
      </button>
      <a class="action-btn" href="${esc(viewHref)}#comments" aria-label="Comments">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
        <span>${stats.commentCount || 0}</span>
      </a>
      <a class="view-bag-btn" href="${esc(viewHref)}" style="margin-left:auto;font-size:12px;font-weight:600;color:var(--accent);text-decoration:none;padding:5px 12px;border:1px solid rgba(57,211,83,0.35);border-radius:6px;background:rgba(57,211,83,0.08);transition:all 0.15s">View Bag →</a>
    </div>`;

  // Likes line
  const likesLineHtml = likeCount > 0
    ? `<div class="card-likes-line">${likeCount} ${likeCount === 1 ? 'like' : 'likes'}</div>`
    : '';

  // Comments section
  let commentsHtml = '';
  if (commentsForCard && commentsForCard.length > 0) {
    const totalCount = stats.commentCount || commentsForCard.length;
    const shown = commentsForCard.slice(-2);
    const lines = shown.map(c => {
      const author = esc(c.author_name || 'Anonymous');
      const text = esc(c.text || '');
      return `<div class="card-comment-line"><span class="comment-author">${author}</span><span class="comment-text">${text}</span></div>`;
    }).join('');
    const viewAllHtml = totalCount > 2
      ? `<a class="card-view-comments" href="${esc(viewHref)}#comments">View all ${totalCount} comments</a>`
      : '';
    commentsHtml = `<div class="card-comments">${lines}${viewAllHtml}</div>`;
  }

  return `
    <div class="bag-card">
      <div class="card-header">
        ${avatarHtml}
        <div>
          <div class="card-name">${esc(name)}${bagInfo.showName ? ` <span style="font-weight:500;color:var(--muted);font-size:0.85em">· ${esc(bagInfo.bagName)}</span>` : ''}</div>
          ${pdgaNumber ? `<a class="card-pdga" href="https://www.pdga.com/player/${encodeURIComponent(pdgaNumber)}" target="_blank" rel="noopener noreferrer">PDGA #${esc(pdgaNumber)}</a>` : ''}
        </div>
        ${ago ? `<span class="card-header-timestamp">${ago}</span>` : ''}
      </div>
      <div class="card-body">
        <div class="disc-breakdown">${breakdownHtml}</div>
        <div class="disc-chips">${chips}${more}</div>
      </div>
      ${actionsHtml}
      ${likesLineHtml}
      ${commentsHtml}
    </div>`;
}

var feed = document.getElementById('feed');
supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
  auth: { detectSessionInUrl: true }
});

// Auth nav
function applyAuthNav(user) {
  currentUser = user;
  const navAuth     = document.getElementById('nav-auth');
  const navProfile  = document.getElementById('nav-profile');
  const navAuthM    = document.getElementById('nav-auth-mobile');
  const navProfileM = document.getElementById('nav-profile-mobile');
  if (user) {
    if (navProfile)  navProfile.style.display  = '';
    if (navProfileM) navProfileM.style.display = '';
    loadNavAvatar(supabase, user);
    if (navAuth)  { navAuth.textContent  = 'Sign Out'; navAuth.href  = '#'; navAuth.onclick  = e => { e.preventDefault(); signOutAndRedirect(supabase, 'index.html'); }; }
    if (navAuthM) { navAuthM.textContent = 'Sign Out'; navAuthM.href = '#'; navAuthM.onclick = e => { e.preventDefault(); signOutAndRedirect(supabase, 'index.html'); }; }
  } else {
    if (navProfile)  navProfile.style.display  = 'none';
    if (navProfileM) navProfileM.style.display = 'none';
    if (navAuth)  { navAuth.textContent  = 'Sign In'; navAuth.href  = 'login.html?from=social.html'; navAuth.onclick  = null; }
    if (navAuthM) { navAuthM.textContent = 'Sign In'; navAuthM.href = 'login.html?from=social.html'; navAuthM.onclick = null; }
  }
}
supabase.auth.onAuthStateChange((event, session) => applyAuthNav(session?.user ?? null));

// Like toggle via event delegation
feed.addEventListener('click', async function(e) {
  const btn = e.target.closest('.like-btn');
  if (!btn) return;

  if (!currentUser) return; // not signed in — do nothing

  const uid = btn.dataset.uid;
  if (!uid) return;
  const bagId = btn.dataset.bagId || '';

  const wasLiked = btn.dataset.liked === '1';
  const oldCount = parseInt(btn.dataset.count, 10) || 0;

  // Optimistic UI update
  const newLiked = !wasLiked;
  const newCount = newLiked ? oldCount + 1 : Math.max(0, oldCount - 1);
  btn.dataset.liked = newLiked ? '1' : '0';
  btn.dataset.count = newCount;
  btn.querySelector('.like-count').textContent = newCount;
  const svg = btn.querySelector('svg');
  if (newLiked) {
    btn.classList.add('liked');
    svg.setAttribute('fill', 'rgba(248,81,73,0.18)');
    svg.setAttribute('stroke', '#f85149');
  } else {
    btn.classList.remove('liked');
    svg.setAttribute('fill', 'none');
    svg.setAttribute('stroke', 'currentColor');
  }

  // Update likes line
  const card = btn.closest('.bag-card');
  if (card) {
    let likesLine = card.querySelector('.card-likes-line');
    if (newCount > 0) {
      const text = `${newCount} ${newCount === 1 ? 'like' : 'likes'}`;
      if (likesLine) {
        likesLine.textContent = text;
      } else {
        // Insert after actions row
        const actions = card.querySelector('.card-actions');
        if (actions) {
          likesLine = document.createElement('div');
          likesLine.className = 'card-likes-line';
          likesLine.textContent = text;
          actions.insertAdjacentElement('afterend', likesLine);
        }
      }
    } else if (likesLine) {
      likesLine.remove();
    }
  }

  // Insert or delete this user's like row, then read back the true count
  let mutErr;
  if (newLiked) {
    const { error } = await supabase.from('bag_likes').insert({
      bag_user_id: uid, bag_id: bagId, liker_id: currentUser.id,
    });
    // Duplicate-row conflict is fine — it means they already liked it.
    mutErr = error && error.code !== '23505' ? error : null;
  } else {
    const { error } = await supabase.from('bag_likes').delete()
      .eq('bag_user_id', uid).eq('bag_id', bagId).eq('liker_id', currentUser.id);
    mutErr = error;
  }

  let serverCount = newCount;
  if (!mutErr) {
    const { data: stat } = await supabase
      .from('bag_like_stats')
      .select('like_count')
      .eq('bag_user_id', uid).eq('bag_id', bagId)
      .maybeSingle();
    serverCount = stat?.like_count || 0;
  }

  if (mutErr) {
    console.error(mutErr);
    // Revert optimistic update on error
    btn.dataset.liked = wasLiked ? '1' : '0';
    btn.dataset.count = oldCount;
    btn.querySelector('.like-count').textContent = oldCount;
    if (wasLiked) {
      btn.classList.add('liked');
      svg.setAttribute('fill', 'rgba(248,81,73,0.18)');
      svg.setAttribute('stroke', '#f85149');
    } else {
      btn.classList.remove('liked');
      svg.setAttribute('fill', 'none');
      svg.setAttribute('stroke', 'currentColor');
    }
  } else {
    // Sync displayed count with server truth
    btn.dataset.count = serverCount;
    btn.querySelector('.like-count').textContent = serverCount;
    if (card) {
      let likesLine = card.querySelector('.card-likes-line');
      if (serverCount > 0) {
        const text = `${serverCount} ${serverCount === 1 ? 'like' : 'likes'}`;
        if (likesLine) {
          likesLine.textContent = text;
        } else {
          const actions = card.querySelector('.card-actions');
          if (actions) {
            likesLine = document.createElement('div');
            likesLine.className = 'card-likes-line';
            likesLine.textContent = text;
            actions.insertAdjacentElement('afterend', likesLine);
          }
        }
      } else if (likesLine) {
        likesLine.remove();
      }
    }
  }
});

// Load community bags
(async function() {
  // Wait for auth to resolve so currentUser is set before rendering
  const session = await getSupabaseSession(supabase);
  applyAuthNav(session?.user ?? null);

  try {
    const { data: rows, error } = await supabase
      .from('bags')
      .select('*')
      .contains('prefs', { public: true });
    if (error) throw error;
    const visible = (rows || []).filter(d => {
      const bagInfos = getPublicBagsForRow(d);
      return bagInfos.some(b => (b.discKeys || []).length > 0);
    });
    if (!visible.length) {
      feed.innerHTML = '<div class="state-msg"><strong>No bags yet</strong>Be the first — turn on sharing from your <a href="profile.html">Profile</a>.</div>';
      return;
    }
    const sorted = visible.sort((a, b) => new Date(b.updated_at) - new Date(a.updated_at));

    // Fetch comments, like stats, and comment stats for visible bags
    const uidList = sorted.map(d => d.user_id).filter(Boolean);
    const statsKey = (uid, bagId) => `${uid}::${bagId || ''}`;
    const commentsByKey = {};
    const statsByKey = {};

    if (uidList.length) {
      const [comm, likeStats, commentStats, myLikes] = await Promise.all([
        supabase.from('comments').select('*').in('bag_user_id', uidList).order('created_at', { ascending: true }),
        supabase.from('bag_like_stats').select('*').in('bag_user_id', uidList),
        supabase.from('bag_comment_stats').select('*').in('bag_user_id', uidList),
        currentUser
          ? supabase.from('bag_likes').select('bag_user_id, bag_id').eq('liker_id', currentUser.id).in('bag_user_id', uidList)
          : Promise.resolve({ data: [] }),
      ]);

      for (const c of (comm.data || [])) {
        const k = statsKey(c.bag_user_id, c.bag_id);
        (commentsByKey[k] = commentsByKey[k] || []).push(c);
      }
      const ensure = k => (statsByKey[k] = statsByKey[k] || { likeCount: 0, isLiked: false, commentCount: 0 });
      for (const r of (likeStats.data || []))    ensure(statsKey(r.bag_user_id, r.bag_id)).likeCount    = r.like_count;
      for (const r of (commentStats.data || [])) ensure(statsKey(r.bag_user_id, r.bag_id)).commentCount = r.comment_count;
      for (const r of (myLikes.data || []))      ensure(statsKey(r.bag_user_id, r.bag_id)).isLiked      = true;
    }

    const html = sorted.flatMap(d => {
      return getPublicBagsForRow(d).map(info => {
        const k = statsKey(d.user_id, info.bagId);
        return renderCard(d, d.user_id, info, commentsByKey[k] || [], statsByKey[k]);
      });
    }).filter(Boolean).join('');
    feed.innerHTML = html || '<div class="state-msg"><strong>No bags yet</strong>Be the first — turn on sharing from your <a href="profile.html">Profile</a>.</div>';
  } catch (e) {
    console.error(e);
    feed.innerHTML = '<div class="state-msg"><strong>Error</strong>' + (e.message || 'Could not load community bags.') + '</div>';
  }
})();
</script>

<div class="help-overlay" id="help-overlay" style="display:none">

      <div class="help-step-text" id="help-step-text"></div>
    </div>
    <div class="help-footer">
      <button class="help-nav-btn" id="help-prev" disabled>← Back</button>
      <div class="help-dots" id="help-dots"></div>
      <button class="help-nav-btn help-nav-primary" id="help-next">Next →</button>
    </div>
  </div>
</div>

<script>
(function() {
  const STEPS = [
    { icon: '🌐', title: 'Community', text: 'Browse bags shared by other BagCreator players. Cards show each player\'s disc breakdown and disc names. Bags are sorted by most recently updated.' },
    { icon: '🔓', title: 'Share Your Bag', text: 'To appear here, go to your Profile page and turn on "Show my bag publicly on the Community page." You can toggle it off any time to hide your bag.' },
    { icon: '👀', title: 'View Bag', text: 'Click "View Bag →" on any card to see the full bag, leave a comment, or like it.' },
    { icon: '❤️', title: 'Liking Bags', text: 'Click the heart on any community bag to like it. You need to be signed in to like a bag. The like count is shown on each card and updates in real time.' },
    { icon: '💬', title: 'Commenting', text: 'Click the comment bubble on a bag to leave a comment. Comments are public and tied to your display name. You can reply to comments and delete your own at any time.' },
  ];
  let cur = 0;
  function render() {
    const s = STEPS[cur];
    document.getElementById('help-icon').textContent        = s.icon;
    document.getElementById('help-step-title').textContent  = s.title;
    document.getElementById('help-step-text').textContent   = s.text;
    document.getElementById('help-counter').textContent     = (cur + 1) + ' / ' + STEPS.length;
    document.getElementById('help-prev').disabled           = cur === 0;
    document.getElementById('help-next').textContent        = cur === STEPS.length - 1 ? 'Done' : 'Next →';
    document.getElementById('help-dots').innerHTML = STEPS.map(function(_, i) {
      return '<button class="help-dot' + (i === cur ? ' active' : '') + '" data-i="' + i + '"></button>';
    }).join('');
  }
  function open()  { cur = 0; render(); document.getElementById('help-overlay').style.display = 'flex'; }
  function close() { document.getElementById('help-overlay').style.display = 'none'; }
  document.getElementById('help-btn').addEventListener('click', open);
  document.getElementById('help-close').addEventListener('click', close);
  document.getElementById('help-overlay').addEventListener('click', function(e) { if (e.target === document.getElementById('help-overlay')) close(); });
  document.getElementById('help-prev').addEventListener('click', function() { if (cur > 0) { cur--; render(); } });
  document.getElementById('help-next').addEventListener('click', function() { if (cur < STEPS.length - 1) { cur++; render(); } else close(); });
  document.getElementById('help-dots').addEventListener('click', function(e) { var d = e.target.closest('[data-i]'); if (d) { cur = parseInt(d.dataset.i); render(); } });
  document.addEventListener('keydown', function(e) {
    if (document.getElementById('help-overlay').style.display === 'none') return;
    if (e.key === 'Escape') close();
    if (e.key === 'ArrowRight' && cur < STEPS.length - 1) { cur++; render(); }
    if (e.key === 'ArrowLeft' && cur > 0) { cur--; render(); }
  });
})();
</script>
