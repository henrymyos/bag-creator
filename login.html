<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — Bag Creator</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d1117; --bg2: #161b22; --bg3: #21262d;
      --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.14);
      --text: #e6edf3; --muted: #8b949e; --accent: #39d353;
    }
    body {
      background: transparent; color: var(--text);
      font-family: 'Barlow', sans-serif;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 1.5rem;
    }
    .bg-frame {
      position: fixed; inset: 0; z-index: -2;
      width: 100%; height: 100%; border: none;
      pointer-events: none;
      filter: blur(8px);
      transform: scale(1.08);
      transform-origin: center;
    }
    .bg-overlay {
      position: fixed; inset: 0; z-index: -1;
      background: rgba(0, 0, 0, 0.55);
    }
    .card {
      position: relative; z-index: 1;
      width: 100%; max-width: 380px;
      background: var(--bg2); border: 1px solid var(--border2);
      border-radius: 14px; padding: 2.5rem 2rem;
    }
    .logo {
      font-family: 'Barlow Condensed', sans-serif; font-size: 22px;
      font-weight: 700; letter-spacing: 0.02em; text-align: center;
      margin-bottom: 1.75rem; color: var(--text); text-decoration: none;
      display: block;
    }
    .logo span { color: var(--accent); }
    .card-title {
      font-family: 'Barlow Condensed', sans-serif; font-size: 1.5rem;
      font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase;
      text-align: center; margin-bottom: 0.35rem;
    }
    .card-sub { font-size: 13px; color: var(--muted); text-align: center; margin-bottom: 1.75rem; }

    .google-btn {
      width: 100%; display: flex; align-items: center; justify-content: center;
      gap: 10px; padding: 12px 16px;
      background: var(--bg3); border: 1px solid var(--border2); border-radius: 8px;
      color: var(--text); font-family: 'Barlow', sans-serif; font-size: 14px; font-weight: 600;
      cursor: pointer; transition: all 0.15s;
    }
    .google-btn:hover { border-color: rgba(255,255,255,0.25); background: #2d333b; }
    .google-btn:disabled { opacity: 0.6; cursor: default; }

    .error-msg {
      font-size: 12px; color: #f85149;
      min-height: 1.2em; margin-top: 1rem; text-align: center;
    }

    .back-link {
      display: block; text-align: center; margin-top: 1.5rem;
      font-size: 12px; color: var(--muted); text-decoration: none;
    }
    .back-link:hover { color: var(--text); }
  </style>
</head>
<body>

<iframe class="bg-frame" id="bg-frame" scrolling="no" tabindex="-1" aria-hidden="true"></iframe>
<script>
  (function() {
    const allowed = ['index.html', 'archive.html', 'custom-bag.html', 'profile.html'];
    const from = new URLSearchParams(location.search).get('from');
    document.getElementById('bg-frame').src = allowed.includes(from) ? from : 'index.html';
  })();
</script>
<div class="bg-overlay"></div>

<div class="card">
  <a class="logo" href="index.html">Bag<span>Creator</span></a>
  <h1 class="card-title">Sign In</h1>
  <p class="card-sub">Save your bag and access it from any device.</p>

  <button class="google-btn" id="google-btn">
    <svg width="18" height="18" viewBox="0 0 48 48">
      <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
      <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
      <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
      <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
    </svg>
    Continue with Google
  </button>

  <div class="error-msg" id="error-msg"></div>

  <a class="back-link" href="#" onclick="event.preventDefault(); history.back()">← Go Back</a>
</div>

<script src="supabase-config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  supabase.auth.onAuthStateChange((event, session) => {
    if (session?.user) window.location.href = 'custom-bag.html';
  });

  document.getElementById('google-btn').addEventListener('click', async () => {
    document.getElementById('google-btn').disabled = true;
    document.getElementById('error-msg').textContent = '';
    const { error } = await supabase.auth.signInWithOAuth({
      provider: 'google',
      options: { redirectTo: window.location.origin + window.location.pathname }
    });
    if (error) {
      document.getElementById('error-msg').textContent = error.message || 'Something went wrong.';
      document.getElementById('google-btn').disabled = false;
    }
  });
</script>
</body>
</html>
