<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — Bag Creator</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d1117; --bg2: #161b22; --bg3: #21262d;
      --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.14);
      --text: #e6edf3; --muted: #8b949e; --accent: #39d353;
    }
    body {
      background: transparent; color: var(--text);
      font-family: 'Barlow', sans-serif;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 1.5rem;
    }
    .bg-frame {
      position: fixed; inset: 0; z-index: -2;
      width: 100%; height: 100%; border: none;
      pointer-events: none; filter: blur(8px);
      transform: scale(1.08); transform-origin: center;
    }
    .bg-overlay { position: fixed; inset: 0; z-index: -1; background: rgba(0,0,0,0.55); }
    .card {
      position: relative; z-index: 1;
      width: 100%; max-width: 380px;
      background: var(--bg2); border: 1px solid var(--border2);
      border-radius: 14px; padding: 2.5rem 2rem;
    }
    .logo {
      font-family: 'Barlow Condensed', sans-serif; font-size: 22px;
      font-weight: 700; letter-spacing: 0.02em; text-align: center;
      margin-bottom: 1.75rem; color: var(--text); text-decoration: none; display: block;
    }
    .logo span { color: var(--accent); }
    .card-title {
      font-family: 'Barlow Condensed', sans-serif; font-size: 1.5rem;
      font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase;
      text-align: center; margin-bottom: 0.35rem;
    }
    .card-sub { font-size: 13px; color: var(--muted); text-align: center; margin-bottom: 1.75rem; }

    .field { margin-bottom: 0.85rem; }
    .field label { display: block; font-size: 11px; font-weight: 600; color: var(--muted); margin-bottom: 5px; letter-spacing: 0.06em; text-transform: uppercase; }
    .field input {
      width: 100%; padding: 10px 12px;
      background: var(--bg3); border: 1px solid var(--border2); border-radius: 8px;
      color: var(--text); font-family: 'Barlow', sans-serif; font-size: 14px; outline: none;
      transition: border-color 0.15s;
    }
    .field input:focus { border-color: rgba(255,255,255,0.3); }
    .field input::placeholder { color: var(--muted); }

    .submit-btn {
      width: 100%; padding: 11px 16px; margin-top: 0.25rem;
      background: rgba(57,211,83,0.15); border: 1px solid rgba(57,211,83,0.4); border-radius: 8px;
      color: var(--accent); font-family: 'Barlow', sans-serif; font-size: 14px; font-weight: 600;
      cursor: pointer; transition: all 0.15s;
    }
    .submit-btn:hover { background: rgba(57,211,83,0.25); }
    .submit-btn:disabled { opacity: 0.5; cursor: default; }

    .toggle-row {
      display: flex; align-items: center; justify-content: center;
      gap: 6px; margin-top: 1.25rem; font-size: 13px; color: var(--muted);
    }
    .toggle-btn {
      background: none; border: none; color: var(--accent);
      font-family: 'Barlow', sans-serif; font-size: 13px;
      cursor: pointer; padding: 0; text-decoration: underline;
    }

    .error-msg { font-size: 12px; color: #f85149; min-height: 1.2em; margin-top: 0.75rem; text-align: center; }
    .success-msg { font-size: 12px; color: var(--accent); min-height: 1.2em; margin-top: 0.75rem; text-align: center; }

    .back-link {
      display: block; text-align: center; margin-top: 1.5rem;
      font-size: 12px; color: var(--muted); text-decoration: none;
    }
    .back-link:hover { color: var(--text); }
  </style>
</head>
<body>

<iframe class="bg-frame" id="bg-frame" scrolling="no" tabindex="-1" aria-hidden="true"></iframe>
<script>
  (function() {
    const allowed = ['index.html', 'archive.html', 'custom-bag.html', 'profile.html'];
    const from = new URLSearchParams(location.search).get('from');
    document.getElementById('bg-frame').src = allowed.includes(from) ? from : 'index.html';
  })();
</script>
<div class="bg-overlay"></div>

<div class="card">
  <a class="logo" href="index.html">Bag<span>Creator</span></a>
  <h1 class="card-title" id="card-title">Sign In</h1>
  <p class="card-sub" id="card-sub">Save your bag and access it from any device.</p>

  <div class="field">
    <label for="email-input">Email</label>
    <input type="email" id="email-input" placeholder="you@example.com" autocomplete="email" />
  </div>
  <div class="field">
    <label for="password-input">Password</label>
    <input type="password" id="password-input" placeholder="••••••••" autocomplete="current-password" />
  </div>

  <button class="submit-btn" id="submit-btn">Sign In</button>

  <div class="error-msg" id="error-msg"></div>
  <div class="success-msg" id="success-msg"></div>

  <div class="toggle-row">
    <span id="toggle-label">Don't have an account?</span>
    <button class="toggle-btn" id="toggle-btn">Sign Up</button>
  </div>

  <a class="back-link" href="#" id="back-link">← Go Back</a>
</div>

<script src="supabase-config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const ALLOWED_PAGES = ['index.html', 'custom-bag.html', 'profile.html', 'archive.html', 'social.html'];

  function doRedirect() {
    const from = localStorage.getItem('loginFrom') || new URLSearchParams(location.search).get('from');
    localStorage.removeItem('loginFrom');
    window.location.replace((from && ALLOWED_PAGES.includes(from)) ? from : 'custom-bag.html');
  }

  // If already signed in, redirect immediately
  supabase.auth.getSession().then(({ data }) => {
    if (data.session?.user) doRedirect();
  });

  let mode = 'signin'; // or 'signup'

  const titleEl    = document.getElementById('card-title');
  const subEl      = document.getElementById('card-sub');
  const submitBtn  = document.getElementById('submit-btn');
  const toggleLabel = document.getElementById('toggle-label');
  const toggleBtn  = document.getElementById('toggle-btn');
  const errorEl    = document.getElementById('error-msg');
  const successEl  = document.getElementById('success-msg');
  const emailInput = document.getElementById('email-input');
  const passInput  = document.getElementById('password-input');

  toggleBtn.addEventListener('click', () => {
    mode = mode === 'signin' ? 'signup' : 'signin';
    errorEl.textContent = '';
    successEl.textContent = '';
    if (mode === 'signup') {
      titleEl.textContent = 'Create Account';
      subEl.textContent = 'Pick an email and password to get started.';
      submitBtn.textContent = 'Sign Up';
      toggleLabel.textContent = 'Already have an account?';
      toggleBtn.textContent = 'Sign In';
      passInput.setAttribute('autocomplete', 'new-password');
    } else {
      titleEl.textContent = 'Sign In';
      subEl.textContent = 'Save your bag and access it from any device.';
      submitBtn.textContent = 'Sign In';
      toggleLabel.textContent = "Don't have an account?";
      toggleBtn.textContent = 'Sign Up';
      passInput.setAttribute('autocomplete', 'current-password');
    }
  });

  submitBtn.addEventListener('click', async () => {
    const email    = emailInput.value.trim();
    const password = passInput.value;
    errorEl.textContent   = '';
    successEl.textContent = '';

    if (!email || !password) {
      errorEl.textContent = 'Please enter your email and password.';
      return;
    }

    submitBtn.disabled = true;
    submitBtn.textContent = mode === 'signin' ? 'Signing in…' : 'Creating account…';

    if (mode === 'signin') {
      const { error } = await supabase.auth.signInWithPassword({ email, password });
      if (error) {
        errorEl.textContent = error.message;
        submitBtn.disabled = false;
        submitBtn.textContent = 'Sign In';
      } else {
        doRedirect();
      }
    } else {
      const { error } = await supabase.auth.signUp({ email, password });
      if (error) {
        errorEl.textContent = error.message;
        submitBtn.disabled = false;
        submitBtn.textContent = 'Sign Up';
      } else {
        successEl.textContent = 'Account created! Signing you in…';
        const { error: signInErr } = await supabase.auth.signInWithPassword({ email, password });
        if (signInErr) {
          successEl.textContent = '';
          errorEl.textContent = signInErr.message;
          submitBtn.disabled = false;
          submitBtn.textContent = 'Sign Up';
        } else {
          doRedirect();
        }
      }
    }
  });

  // Allow Enter key to submit
  [emailInput, passInput].forEach(el => {
    el.addEventListener('keydown', e => { if (e.key === 'Enter') submitBtn.click(); });
  });

  document.getElementById('back-link').addEventListener('click', e => {
    e.preventDefault();
    const from = new URLSearchParams(location.search).get('from');
    window.location.href = (from && ALLOWED_PAGES.includes(from)) ? from : 'index.html';
  });
</script>
</body>
</html>
